                      <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3}}>
                        <Bdg label={p.label} bg={p.bg} tc={p.cor} fs={9}/>
                        {isSelected&&<div style={{width:14,height:14,borderRadius:7,background:U.success,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"white"}}>✓</div>}

function AgentesAoVivo({negocios,empresas}){
  const [cursors,setCursors]=useState(()=>{
    const c={};AGENTES_DEF.forEach(a=>{c[a.id]=Math.floor(Math.random()*a.tarefas.length);});return c;
  });
  const [progs,setProgs]=useState(()=>{
    const p={};AGENTES_DEF.forEach(a=>{p[a.id]=Math.round(20+Math.random()*70);});return p;
  });
  const [log,setLog]=useState([
    {id:1,ts:new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",second:"2-digit"}),agId:"health",tarefa:"Monitorando estagnação — TechSolutions (12d)",done:true},
    {id:2,ts:new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",second:"2-digit"}),agId:"sdr",tarefa:"Gerando sequência para VP TI / Suzano",done:false},
    {id:3,ts:new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",second:"2-digit"}),agId:"forecast",tarefa:"Calculando forecast Q2",done:true},
  ]);
  const [totalDone,setTotalDone]=useState(0);
  const [pulso,setPulso]=useState(false);

  useEffect(()=>{
    const iv=setInterval(()=>{
      const idx=Math.floor(Math.random()*AGENTES_DEF.length);
      const ag=AGENTES_DEF[idx];
      const nextIdx=(cursors[ag.id]+1)%ag.tarefas.length;
      setCursors(c=>({...c,[ag.id]:nextIdx}));
      setProgs(p=>({...p,[ag.id]:Math.round(20+Math.random()*70)}));
      const ts=new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
      const entryId=Date.now();
      setLog(l=>[{id:entryId,ts,agId:ag.id,tarefa:ag.tarefas[nextIdx],done:false},...l.slice(0,11)]);
      setPulso(true);
      setTimeout(()=>setPulso(false),900);
      // marca como done após 2-3s
      setTimeout(()=>{
        setLog(l=>l.map(x=>x.id===entryId?{...x,done:true}:x));
        setTotalDone(d=>d+1);
      },2000+Math.random()*1500);
    },2800);
    return()=>clearInterval(iv);
  },[cursors]);

  // KPIs rápidos dos agentes
  const totalNegocios=negocios.length;
  const valorTotal=negocios.reduce((s,n)=>s+n.valor,0);
  const highScore=negocios.filter(n=>calcScore(n.sinais,n.curva)>=70).length;

  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>

            <span style={{fontSize:11,color:U.success,fontWeight:600}}>LIVE · {AGENTES_DEF.length} agentes</span>
          </div>
        }
      />

      {/* KPIs dos agentes */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
        {[
          {label:"Agentes Ativos",value:`${AGENTES_DEF.length}/8`,icon:"🤖",grad:`linear-gradient(135deg,#7C3AED,#A78BFA)`},
          {label:"Tarefas Concluídas",value:totalDone,icon:"✓",grad:`linear-gradient(135deg,${U.success},#34D399)`},
          {label:"Deals Monitorados",value:totalNegocios,icon:"💼",grad:`linear-gradient(135deg,${U.primary},${U.light})`},
          {label:"Oportunidades Quentes",value:highScore,icon:"🔥",grad:`linear-gradient(135deg,${U.warning},#FCD34D)`},
        ].map(k=><KPI key={k.label} label={k.label} value={k.value} icon={k.icon} grad={k.grad}/>)}
      </div>

      {/* Grid de agentes */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10}}>
        {AGENTES_DEF.map(ag=>{
          const tarefa=ag.tarefas[cursors[ag.id]||0];
          const prog=progs[ag.id]||50;
          return(
            <Crd key={ag.id} style={{borderLeft:`3px solid ${ag.cor}`,padding:"0.9rem 1rem"}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:10}}>
                <div style={{width:36,height:36,borderRadius:10,background:ag.cor+"18",border:`1px solid ${ag.cor}33`,
                  display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{ag.icon}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
                    <span style={{fontSize:12,fontWeight:700,color:U.dark}}>{ag.nome}</span>
                    <Bdg label={ag.grupo} bg={ag.cor+"18"} tc={ag.cor} fs={9}/>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:5}}>
                    <div style={{width:6,height:6,borderRadius:3,background:U.success,flexShrink:0,
                      animation:"agPulse 1.4s ease-in-out infinite"}}/>
                    <span style={{fontSize:10,color:U.success,fontWeight:500}}>em execução</span>
                  </div>
                </div>
                <span style={{fontSize:11,fontWeight:700,color:ag.cor}}>{prog}%</span>
              </div>
              <div style={{fontSize:11,color:U.textSec,lineHeight:1.5,minHeight:30,marginBottom:8}}>{tarefa}</div>
              <PBar pct={prog} h={5} color={ag.cor}/>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:5}}>
                <span style={{fontSize:10,color:U.textMuted}}>
                  {ag.tarefas.length} tarefas configuradas
                </span>
                <span style={{fontSize:10,color:U.textMuted}}>latência &lt; 5s</span>
              </div>
            </Crd>
          );
        })}
      </div>

      {/* Log de atividades */}
      <Crd style={{padding:0,overflow:"hidden"}}>
        <div style={{padding:"10px 16px",borderBottom:`1px solid ${U.borderLight}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{fontSize:13,fontWeight:700,color:U.dark}}>Log de Atividades</span>
          <Bdg label={`${totalDone} concluídas`} bg={U.bgSuccess} tc={U.success} bdr={U.success}/>
        </div>
        <div style={{maxHeight:280,overflowY:"auto"}}>
          {log.map((entry,i)=>{
            const ag=AGENTES_DEF.find(a=>a.id===entry.agId)||AGENTES_DEF[0];
            return(
              <div key={entry.id} style={{
                display:"flex",alignItems:"flex-start",gap:10,padding:"8px 16px",
                borderBottom:`1px solid ${U.borderLight}`,
                background:i===0&&!entry.done?U.bgInfo:"white",
                transition:"background .5s",
              }}>
                <span style={{fontSize:10,color:U.textMuted,whiteSpace:"nowrap",paddingTop:2,fontVariantNumeric:"tabular-nums",width:64,flexShrink:0}}>{entry.ts}</span>
                <span style={{fontSize:11,fontWeight:600,color:ag.cor,whiteSpace:"nowrap",paddingTop:1,width:120,flexShrink:0}}>{ag.nome}</span>
                <span style={{fontSize:11,color:U.textSec,flex:1,lineHeight:1.5}}>{entry.tarefa}</span>
                <span style={{fontSize:12,flexShrink:0,paddingTop:1}}>{entry.done?"✅":"⏳"}</span>
              </div>
            );
          })}
        </div>
      </Crd>
      <style>{`@keyframes agPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}`}</style>
    </div>
  );
}

            {r.status==="aguardando"?(
              <Btn variant="primary" onClick={()=>rotear(r.id)} style={{opacity:loading===r.id?.6:1}}>
                {loading===r.id?"...":"Rotear"}
              </Btn>
            ):(
              <Bdg label="Roteado ✓" bg={U.bgSuccess} tc={U.success} bdr={U.success}/>
            )}
          </div>
        ))}
      </Crd>
    </div>
  );
}

// IA — FORECAST IA
// ═══════════════════════════════════════════════════════════════
function ForecastIA({negocios}){
  const [cenario,setCenario]=useState("realista");
  const total=negocios.reduce((s,n)=>s+n.valor,0);
  const pond=negocios.reduce((s,n)=>s+n.valor*(n.prob/100),0);
  const fechamento=negocios.filter(n=>n.fase==="Fechamento"||n.fase==="Contrato").reduce((s,n)=>s+n.valor,0);

  const mult={otimista:1.25,realista:1.0,pessimista:0.75}[cenario];
  const forecastVal=Math.round(pond*mult);

  const fases=["Prospecção","Qualificação","Proposta","Negociação","Fechamento"];
  const faseData=fases.map(f=>({
    fase:f,
    count:negocios.filter(n=>n.fase===f).length,
    valor:negocios.filter(n=>n.fase===f).reduce((s,n)=>s+n.valor,0),
    prob:f==="Fechamento"?90:f==="Negociação"?70:f==="Proposta"?50:f==="Qualificação"?30:15,
  }));

  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <ST t="Forecast IA — Previsão de Vendas" sub="Agregação de dados CRM + modelo preditivo com cenários"/>

      {/* Cenário selector */}
      <div style={{display:"flex",gap:2,borderBottom:`1px solid ${U.borderLight}`,marginBottom:4}}>
        {["otimista","realista","pessimista"].map(c=>(
          <div key={c} onClick={()=>setCenario(c)} style={{padding:"8px 20px",cursor:"pointer",fontSize:12,fontWeight:cenario===c?700:400,
            color:cenario===c?(c==="otimista"?U.success:c==="pessimista"?U.danger:U.primary):U.textMuted,
            borderBottom:cenario===c?`2px solid ${c==="otimista"?U.success:c==="pessimista"?U.danger:U.primary}`:"2px solid transparent",
            textTransform:"capitalize"}}>
            {c==="otimista"?"📈 Otimista":c==="pessimista"?"📉 Pessimista":"🎯 Realista"}
          </div>
        ))}
      </div>

      {/* KPIs forecast */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
        <KPI label="Forecast (ponderado IA)" value={fmtK(forecastVal)} icon="🎯"
          grad={`linear-gradient(135deg,${cenario==="otimista"?U.success+",#34D399":cenario==="pessimista"?U.danger+",#F87171":U.primary+","+U.light})`}/>
        <KPI label="Pipeline Total" value={fmtK(total)} icon="📊"
          grad={`linear-gradient(135deg,${U.primary},${U.light})`}/>
        <KPI label="Fechamento Iminente" value={fmtK(fechamento)} icon="✓"
          grad={`linear-gradient(135deg,${U.success},#34D399)`}/>
      </div>

      {/* Funil de conversão por etapa */}
      <Crd>
        <div style={{fontSize:13,fontWeight:700,color:U.dark,marginBottom:14}}>Funil de Conversão — Probabilidade por Etapa</div>
        {faseData.filter(f=>f.count>0).map((f,i)=>(
          <div key={f.fase} style={{marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <div style={{width:8,height:8,borderRadius:2,background:FC[i%6]}}/>
                <span style={{fontSize:12,color:U.textSec}}>{f.fase}</span>
                <Bdg label={`${f.count} deals`} bg={U.bg} tc={U.textMuted} fs={9}/>
              </div>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <span style={{fontSize:11,color:U.textMuted}}>{f.prob}% prob.</span>
                <span style={{fontSize:12,fontWeight:700,color:U.dark}}>{fmtK(f.valor)}</span>
              </div>
            </div>
            <PBar pct={f.prob} h={7} color={FC[i%6]}/>
          </div>
        ))}
      </Crd>

      {/* Análise por consultor */}
      <Crd>
        <div style={{fontSize:13,fontWeight:700,color:U.dark,marginBottom:14}}>Forecast por Consultor</div>
        {["Maria Souza","João Silva","Ana Paula","Carlos Lima"].map((c,i)=>{
          const ns=negocios.filter(n=>n.responsavel===c);
          const v=ns.reduce((s,n)=>s+n.valor*(n.prob/100),0);
          const max=Math.max(...["Maria Souza","João Silva","Ana Paula","Carlos Lima"].map(x=>negocios.filter(n=>n.responsavel===x).reduce((s,n)=>s+n.valor*(n.prob/100),0)));
          return v>0?(
            <div key={c} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <div style={{width:28,height:28,borderRadius:14,background:`linear-gradient(135deg,${FC[i%6]},${FC[(i+1)%6]})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"white",flexShrink:0}}>{c.split(" ").map(x=>x[0]).join("")}</div>
              <span style={{fontSize:11,color:U.textSec,width:100,flexShrink:0}}>{c}</span>
              <div style={{flex:1}}>
                <PBar pct={max>0?Math.round((v/max)*100):0} h={7} color={FC[i%6]}/>
              </div>
              <span style={{fontSize:12,fontWeight:700,color:U.dark,width:70,textAlign:"right"}}>{fmtK(v)}</span>
            </div>
          ):null;
        })}
      </Crd>

      {/* Aviso IA */}
      <div style={{background:U.bgInfo,border:`1px solid ${U.primary}20`,borderRadius:12,padding:"10px 16px",display:"flex",gap:10,alignItems:"flex-start"}}>
        <span style={{fontSize:16}}>🤖</span>
        <div>
          <div style={{fontSize:12,fontWeight:700,color:U.primary,marginBottom:2}}>Forecast AI — Análise</div>
          <div style={{fontSize:11,color:U.textSec,lineHeight:1.5}}>
            {cenario==="otimista"?"Cenário otimista assume aceleração de ciclo e aumento de 25% no win rate com base no histórico de Q4. Recomendado apenas para planejamento de capacidade.":
             cenario==="pessimista"?"Cenário pessimista considera ciclos 30% mais longos e pressão competitiva. Use para planejamento de budget mínimo.":
             "Forecast realista baseado em probabilidade histórica por estágio. Pipeline ponderado ajustado pelo score de saúde dos deals."}
          </div>
        </div>
      </div>
    </div>
  );
}

// MAIN APP — com autenticação e controle de acesso
// ═══════════════════════════════════════════════════════════════
export default function App(){
  const [usuario,setUsuario]=useState(null); 
  const [active,setActive]=useState("dashboard");
  const [loading,setLoading]=useState(false);
  
  // Estados agora sincronizados com Supabase
  const [empresas,setEmpresas]=useState([]);
  const [negocios,setNegocios]=useState([]);
  const [tarefas,setTarefas]=useState([]);
  
  // Estados que ainda são locais (podemos migrar depois)
  const [tiItens,setTiItens]=useState(seedItens);
  const [tiVendas,setTiVendas]=useState(seedVendasTI);
  const [tiMovs,setTiMovs]=useState(seedMovs);
  const [okrData,setOkrData]=useState(initOKRData);
  const [orcamentos,setOrcamentos]=useState(initOrcamentos);

  // ── Sincronização com Supabase ──
  useEffect(() => {
    if (usuario) {
      async function fetchData() {
        setLoading(true);
        try {
          const [resEmp, resNeg, resTar] = await Promise.all([
            supabase.from('empresas').select('*').order('created_at', { ascending: false }),
            supabase.from('negocios').select('*').order('created_at', { ascending: false }),
            supabase.from('tarefas').select('*').order('created_at', { ascending: false })
          ]);

          if (resEmp.data) setEmpresas(resEmp.data);
          if (resNeg.data) setNegocios(resNeg.data);
          if (resTar.data) setTarefas(resTar.data);
        } catch (err) {
          console.error("Erro ao sincronizar:", err);
        } finally {
          setLoading(false);
        }
      }
      fetchData();
    }
  }, [usuario]);

  // ── Login ─────────────────────────────────────────────────────
  if(!usuario) return <LoginScreen onLogin={u=>{setUsuario(u);setActive("dashboard");}}/>;

  const perfil=PERFIS[usuario.perfil]||PERFIS.consultor;
  const isAdmin=usuario.perfil==="admin";
  const isGerente=usuario.perfil==="admin"||usuario.perfil==="gerente";

  // ── Filtro de dados por perfil ────────────────────────────────
  // Consultores veem apenas os seus próprios dados
  const negociosFiltrados=perfil.verTodos?negocios:negocios.filter(n=>n.responsavel===usuario.nome);
  const tarefasFiltradas=perfil.verTodos?tarefas:tarefas.filter(t=>t.responsavel===usuario.nome);
  const orcamentosFiltrados=perfil.verTodos?orcamentos:orcamentos.filter(o=>o.consultor===usuario.nome);

  const addMov=m=>setTiMovs(ms=>[{...m,id:"MV"+uid(),data:now(),usuario:m.usuario||usuario.nome},...ms]);

  const vencidas=tarefasFiltradas.filter(t=>t.status==="Vencida").length;
  const pendP=negociosFiltrados.filter(n=>n.fase==="Fechamento"&&!n.projeto).length;
  const tiAlerts=tiItens.filter(i=>i.qtdEstoque<=i.qtdMin).length;

  const menuGroup=MENU.find(m=>m.id===active)?.group;
  const isTI=menuGroup==="TI";
  const isOKR=menuGroup==="OKR";
  const isINT=menuGroup==="INT";
  const isIA=menuGroup==="IA";

  const views={
    dashboard:      <DashboardUnificado empresas={empresas} negocios={negociosFiltrados} tarefas={tarefasFiltradas} tiItens={tiItens} tiVendas={tiVendas} okrData={okrData}/>,
    empresas:       <Empresas empresas={empresas} setEmpresas={setEmpresas}/>,
    pipeline:       <Pipeline negocios={negociosFiltrados} setNegocios={setNegocios}/>,
    negocios:       <Negocios negocios={negociosFiltrados} setNegocios={setNegocios}/>,
    scoring:        <Scoring negocios={negociosFiltrados} setNegocios={setNegocios}/>,
    atividades:     <Atividades tarefas={tarefasFiltradas} setTarefas={setTarefas}/>,
    projetos:       <Projetos negocios={negociosFiltrados} setNegocios={setNegocios}/>,
    ticket:         <TicketMedio negocios={negociosFiltrados} setNegocios={setNegocios} orcamentos={orcamentosFiltrados}/>,
    orcamento:      <Orcamento negocios={negociosFiltrados} orcamentos={orcamentosFiltrados} setOrcamentos={setOrcamentos}/>,
    "ti-cadastro":  <CadastroItens itens={tiItens} setItens={setTiItens} addMov={addMov}/>,
    "ti-cadastro":  <CadastroItens itens={tiItens} setItens={setTiItens} addMov={addMov}/>,
    "ti-movs":      <Movimentacoes itens={tiItens} movs={tiMovs} addMov={addMov}/>,
    "ti-vendas":    <VendasTI itens={tiItens} vendas={tiVendas} setVendas={setTiVendas}/>,
    "ti-relatorios":<RelatoriosTI vendas={tiVendas} itens={tiItens} movs={tiMovs}/>,
    okr:            <OKRDashboard data={okrData} setData={setOkrData}/>,
    "int-whats":    <IntWhatsApp usuario={usuario}/>,
    "int-teams":    <IntTeams usuario={usuario}/>,
    "int-o365":     <IntOffice365 usuario={usuario}/>,
    "int-config":   <IntConfig usuario={usuario}/>,
    "ia-agentes":   <AgentesAoVivo negocios={negociosFiltrados} empresas={empresas}/>,
    "ia-roteamento":<RoteamentoLeads negocios={negociosFiltrados} empresas={empresas} setNegocios={setNegocios}/>,
    "ia-forecast":  <ForecastIA negocios={negociosFiltrados}/>,
  };

  const groupLabels={HOME:"🏠 Início",CRM:"🔷 CRM & Comercial",TI:"🔶 Backoffice Sales",OKR:"📊 OKR",INT:"🔗 Integrações",IA:"🤖 Agentes de IA"};

  // Menus bloqueados para este perfil
  const menuBloqueado=perfil.menuBloqueado||[];

  return (
    <div style={{display:"flex",minHeight:700,fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",fontSize:13,background:U.bg}}>
      {/* Sidebar */}
      <div style={{width:215,background:`linear-gradient(180deg,${U.bgSide} 0%,#001230 100%)`,flexShrink:0,display:"flex",flexDirection:"column",boxShadow:"2px 0 16px rgba(0,0,0,0.22)"}}>
        {/* Logo + Hero strip */}
        <div style={{position:"relative",overflow:"hidden",borderBottom:"1px solid rgba(255,255,255,0.08)"}}>
          <div style={{position:"absolute",inset:0,background:`none`,opacity:0.18}}/>
          <div style={{position:"absolute",inset:0,background:`linear-gradient(180deg,${U.bgSide}CC 0%,${U.bgSide} 100%)`}}/>
          <div style={{position:"relative",zIndex:1,padding:"1.25rem 1.25rem 1rem"}}>
            <Logo/>
            <div style={{fontSize:9,color:"rgba(255,255,255,0.4)",marginTop:6,letterSpacing:1.2,textTransform:"uppercase"}}>Plataforma de Negócios</div>
          </div>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"0.5rem 0"}}>
          {["HOME","CRM","TI","OKR","INT","IA"].map(grp=>(
            <div key={grp}>
              <div style={{fontSize:9,fontWeight:700,color:"rgba(0,200,240,0.5)",letterSpacing:2,textTransform:"uppercase",padding:"12px 1.25rem 4px",marginTop:4,borderTop:grp!=="HOME"?"1px solid rgba(255,255,255,0.07)":"none"}}>
                {groupLabels[grp]}
              </div>
              {MENU.filter(m=>m.group===grp).map(m=>{
                const isA=active===m.id;
                const bloqueado=menuBloqueado.includes(m.id);
                const badge=(m.id==="atividades"?vencidas:m.id==="projetos"?pendP:m.id==="ti-cadastro"?tiAlerts:0);
                const badgeBg=m.id==="projetos"?[U.bgWarning,U.warning]:[U.bgDanger,U.danger];
                return (
                  <div key={m.id} onClick={()=>!bloqueado&&setActive(m.id)}
                    style={{display:"flex",alignItems:"center",gap:10,padding:"8px 1.25rem",cursor:bloqueado?"not-allowed":"pointer",background:isA?"rgba(0,200,240,0.13)":"transparent",borderLeft:isA?`3px solid ${U.cyan}`:"3px solid transparent",margin:"1px 0",transition:"all .12s",opacity:bloqueado?0.35:1}}>
                    <span style={{fontSize:13,opacity:isA?1:0.6}}>{m.icon}</span>
                    <span style={{flex:1,fontSize:11,fontWeight:isA?600:400,color:isA?U.cyan:"rgba(255,255,255,0.72)"}}>{m.label}</span>
                    {bloqueado&&<span style={{fontSize:9,color:"rgba(255,255,255,0.3)"}}>🔒</span>}
                    {!bloqueado&&badge>0&&<span style={{fontSize:9,background:badgeBg[0],color:badgeBg[1],padding:"1px 6px",borderRadius:10,fontWeight:700}}>{badge}</span>}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
        {/* User card */}
        <div style={{padding:"0.75rem 1.25rem",borderTop:"1px solid rgba(255,255,255,0.08)"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:30,height:30,borderRadius:15,background:`linear-gradient(135deg,${perfil.cor},${U.light})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"white"}}>{usuario.avatar}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:11,color:"rgba(255,255,255,0.85)",fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{usuario.nome}</div>
              <div style={{fontSize:9,color:"rgba(255,255,255,0.4)"}}>{perfil.label}</div>
            </div>
            <div onClick={()=>setUsuario(null)} title="Sair" style={{cursor:"pointer",fontSize:14,opacity:0.5,padding:"2px"}}>⏏</div>
          </div>
        </div>
      </div>

      {/* Main Content */}
      <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column"}}>
        {/* Topbar */}
        <div style={{position:"relative",overflow:"hidden",borderBottom:`1px solid ${U.border}`,boxShadow:"0 2px 8px rgba(0,87,184,0.08)",flexShrink:0}}>
          <div style={{position:"absolute",inset:0,background:`none`,opacity:0.08}}/>
          <div style={{position:"absolute",inset:0,background:`linear-gradient(90deg,white 40%,rgba(255,255,255,0.92) 100%)`}}/>
          <div style={{position:"relative",zIndex:1,padding:"0.7rem 1.75rem",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:12,color:isINT?"#128C7E":isOKR?"#7C3AED":isTI?U.warning:isIA?"#7C3AED":U.primary,fontWeight:700,background:isINT?"#D1FAE5":isOKR?"#EDE9FE":isTI?U.bgWarning:isIA?"#EDE9FE":U.bgInfo,padding:"3px 12px",borderRadius:20,border:`1px solid ${isINT?"#6EE7B7":isOKR?"#C4B5FD":isTI?U.warning+"40":isIA?"#C4B5FD":U.border}`}}>
                {isINT?"🔗 Integrações":isOKR?"📊 OKR":isTI?"🔶 Backoffice":isIA?"🤖 Agentes de IA":"🔷 CRM"}
              </span>
              <div style={{fontSize:14,fontWeight:700,color:U.dark}}>{MENU.find(m=>m.id===active)?.label}</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              {tiAlerts>0&&<span style={{fontSize:10,background:U.bgDanger,color:U.danger,padding:"3px 10px",borderRadius:20,fontWeight:600,border:`1px solid ${U.danger}30`}}>⚠ {tiAlerts} alertas TI</span>}
              {vencidas>0&&<span style={{fontSize:10,background:U.bgWarning,color:U.warning,padding:"3px 10px",borderRadius:20,fontWeight:600,border:`1px solid ${U.warning}30`}}>⏰ {vencidas} vencidas</span>}
              {/* Perfil badge */}
              <div style={{display:"flex",alignItems:"center",gap:8,background:perfil.bg,border:`1px solid ${perfil.cor}30`,borderRadius:20,padding:"4px 12px"}}>
                <div style={{width:24,height:24,borderRadius:12,background:`linear-gradient(135deg,${perfil.cor},${U.light})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"white"}}>{usuario.avatar}</div>
                <div>
                  <div style={{fontSize:11,fontWeight:700,color:perfil.cor,lineHeight:1}}>{usuario.nome}</div>
                  <div style={{fontSize:9,color:U.textMuted}}>{perfil.label}</div>
                </div>
                <div onClick={()=>setUsuario(null)} style={{cursor:"pointer",fontSize:11,color:U.textMuted,marginLeft:4}} title="Sair">⏏</div>
              </div>
            </div>
          </div>
        </div>
        <div style={{padding:"1.5rem 1.75rem",flex:1}}>
          {menuBloqueado.includes(active)?(
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:300,gap:12}}>
              <div style={{fontSize:40}}>🔒</div>
              <div style={{fontSize:16,fontWeight:700,color:U.dark}}>Acesso restrito</div>
              <div style={{fontSize:13,color:U.textMuted}}>Seu perfil <strong>{perfil.label}</strong> não tem permissão para acessar este módulo.</div>
              <Bdg label={`Necessário: Gerente ou Admin`} bg={U.bgWarning} tc={U.warning} bdr={U.warning}/>
            </div>
          ):views[active]}
        </div>
      </div>
    </div>
  );
}
