// ═══════════════════════════════════════════════════════════════
const calcABC=es=>{const t=es.reduce((s,e)=>s+(e.faturamento||0),0);let a=0;return[...es].sort((x,y)=>(y.faturamento||0)-(x.faturamento||0)).map(e=>{a+=(e.faturamento||0);const p=t>0?a/t:0;return{...e,curva:p<=.8?"A":p<=.95?"B":"C",pctAcum:Math.round(p*100)};});};
const calcScore=(s,c)=>Math.min(Math.round(SINAIS.filter(x=>s?.[x.id]).reduce((a,x)=>a+x.pts,0)*(ABC[c]?.mult||1)),100);
const getPri=sc=>sc>=70?"Alta":sc>=40?"Media":"Baixa";
function calcVenda(v){
  let rob=0,descontos=0,impostos=0,custoTotal=0;
  (v.itens||[]).forEach(it=>{const bruto=it.precoUnit*it.qtd,desc=bruto*(it.desconto||0)/100,imp=(bruto-desc)*(it.imposto||0)/100;rob+=bruto;descontos+=desc;impostos+=imp;custoTotal+=it.custoUnit*it.qtd;});
  const rol=rob-descontos-impostos,lucroBruto=rol-custoTotal,ll=lucroBruto-(v.despesasAdicionais||0);
  return{rob,descontos,impostos,rol,custoTotal,lucroBruto,ll,margemBruta:rol>0?lucroBruto/rol*100:0,margemLL:rol>0?ll/rol*100:0};
}

function Checklist({status,onChange}){
  const done=Object.values(status||{}).filter(Boolean).length;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <div style={{background:U.bg,borderRadius:10,padding:"0.75rem 1rem",border:`1px solid ${U.borderLight}`}}>

          <span style={{fontSize:12,fontWeight:600,color:U.dark}}>Progresso geral</span>
          <span style={{fontSize:12,fontWeight:600,color:done===CK_TOTAL?U.success:U.primary}}>{done}/{CK_TOTAL} — {ckPct(status)}%</span>
        </div>
        <PBar pct={ckPct(status)} h={8}/>
      </div>
      {CK_TMPL.map(fase=>{
        const f=fase.itens.filter(i=>status?.[i.id]).length;
        return (
          <div key={fase.fase} style={{background:fase.cor,border:`1px solid ${fase.bdr}`,borderRadius:10,padding:"0.9rem 1.1rem"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <span style={{fontSize:16}}>{fase.icon}</span>
              <span style={{fontWeight:600,fontSize:12,color:fase.tc,flex:1}}>{fase.fase}</span>
              <span style={{fontSize:11,color:fase.tc,fontWeight:600}}>{f}/{fase.itens.length}</span>
            </div>
            {fase.itens.map(item=>{
              const on=status?.[item.id]||false;
              return (
                <div key={item.id} onClick={()=>onChange({...status,[item.id]:!on})} style={{display:"flex",alignItems:"flex-start",gap:8,cursor:"pointer",padding:"5px 6px",borderRadius:8,background:on?fase.bdr+"25":"transparent",marginBottom:3}}>

                  <span style={{fontSize:12,color:on?fase.tc:U.textSec,textDecoration:on?"line-through":"none"}}>{item.label}</span>

}

            <div><div style={{fontSize:10,color:U.textMuted,marginBottom:4,fontWeight:500}}>Porte</div><select value={form.porte} onChange={e=>setForm({...form,porte:e.target.value})} style={{width:"100%",border:`1px solid ${U.border}`,borderRadius:8,padding:"7px 10px",fontSize:12}}><option>Pequeno</option><option>Médio</option><option>Grande</option></select></div>

            <div><div style={{fontSize:10,color:U.textMuted,marginBottom:4,fontWeight:500}}>Consultor</div><input value={form.consultor} onChange={e=>setForm({...form,consultor:e.target.value})} placeholder="Nome do Consultor" style={{width:"100%",boxSizing:"border-box",border:`1px solid ${U.border}`,borderRadius:8,padding:"7px 10px",fontSize:12}}/></div>

            <div><div style={{fontSize:10,color:U.textMuted,marginBottom:4,fontWeight:500}}>Contato Principal</div><input value={form.contato} onChange={e=>setForm({...form,contato:e.target.value})} placeholder="Nome do contato" style={{width:"100%",boxSizing:"border-box",border:`1px solid ${U.border}`,borderRadius:8,padding:"7px 10px",fontSize:12}}/></div>
            {/* Linha 6 */}

            <div><div style={{fontSize:10,color:U.textMuted,marginBottom:4,fontWeight:500}}>Telefone</div><input value={form.tel} onChange={e=>setForm({...form,tel:e.target.value})} placeholder="(00) 0 0000-0000" style={{width:"100%",boxSizing:"border-box",border:`1px solid ${U.border}`,borderRadius:8,padding:"7px 10px",fontSize:12}}/></div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <Btn variant="primary" onClick={()=>{if(!form.nome)return;setEmpresas([...empresas,{...form,id:Date.now(),funcionarios:form.colaboradores||0,status:"Lead"}]);setShowForm(false);setForm({nome:"",segmento:"",porte:"Médio",cidade:"",contato:"",email:"",tel:"",faturamento:0,colaboradores:0,setor:"Privado",preVenda:"",consultor:""});}}>Salvar empresa</Btn>
            <Btn onClick={()=>setShowForm(false)}>Cancelar</Btn>

      <div style={{display:"flex",gap:6}}>
        {["Todas","A","B","C"].map(f=>{const m=f!=="Todas"?ABC[f]:null;return(<span key={f} onClick={()=>setFiltro(f)} style={{fontSize:11,padding:"4px 14px",borderRadius:20,cursor:"pointer",background:filtro===f?(m?m.bg:U.primary):U.bgCard,color:filtro===f?(m?m.tc:"white"):U.textSec,border:`1px solid ${filtro===f?(m?m.bdr:U.primary):U.border}`,fontWeight:500}}>{f==="Todas"?"Todas":m.full}</span>);})}
      </div>
      {filtradas.map(e=>{
        const m=ABC[e.curva];
        const sCor={Ativo:[U.bgSuccess,U.success],Negociando:[U.bgWarning,U.warning],Lead:[U.bgInfo,U.primary]};
        const[sb,st]=sCor[e.status]||[U.bg,U.textSec];
        return (
          <div key={e.id} onClick={()=>setDetalhe(e.id)} style={{background:U.bgCard,border:`1px solid ${U.borderLight}`,borderLeft:`4px solid ${m.bdr}`,borderRadius:12,padding:"0.9rem 1.25rem",cursor:"pointer"}}>
            {/* Linha 1: nome + badges */}
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
              <div style={{width:38,height:38,borderRadius:10,background:m.bg,border:`1.5px solid ${m.bdr}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{m.icon}</div>
              <div style={{flex:1}}>
                <div style={{display:"flex",gap:7,flexWrap:"wrap",alignItems:"center",marginBottom:2}}>
                  <span style={{fontWeight:700,fontSize:13,color:U.dark}}>{e.nome}</span>
                  <Bdg label={m.full} bg={m.bg} tc={m.tc} bdr={m.bdr} fs={10}/>
                  <Bdg label={e.status} bg={sb} tc={st} fs={10}/>
                  {e.setor&&<Bdg label={e.setor} bg={e.setor==="Público"?"#EDE9FE":"#EBF4FF"} tc={e.setor==="Público"?"#5B21B6":U.primary} fs={10}/>}
                </div>
                <div style={{fontSize:11,color:U.textMuted}}>{e.segmento} · {e.porte} · {e.cidade}</div>

              {/* Faturamento destaque */}

              {(e.colaboradores||e.funcionarios)>0&&(
                <div style={{display:"flex",alignItems:"center",gap:4,background:U.bgInfo,borderRadius:8,padding:"3px 10px"}}>

                <div style={{display:"flex",alignItems:"center",gap:4,background:"#FFF7ED",borderRadius:8,padding:"3px 10px",border:"1px solid #FED7AA"}}>

                </div>
              )}

                <div style={{display:"flex",alignItems:"center",gap:4,background:U.bg,borderRadius:8,padding:"3px 10px"}}>

                  <span style={{fontSize:11,color:U.textSec}}>{e.funil}</span>

}

function Pipeline({negocios,setNegocios}){
  const [funil,setFunil]=useState("Comercial B2B");
  const [fases,setFases]=useState(FUNIS);
  const [novaF,setNovaF]=useState("");
  const [editF,setEditF]=useState(false);
  const [dragId,setDragId]=useState(null);
  const [dropF,setDropF]=useState(null);
  const fa=fases[funil]||[];
  const drop=f=>{if(dragId==null)return;setNegocios(ns=>ns.map(n=>n.id===dragId?{...n,fase:f}:n));setDragId(null);setDropF(null);};
  return (
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <ST t="Pipeline" sub="Arraste os cards entre etapas" action={<Btn onClick={()=>setEditF(!editF)}>{editF?"Fechar":"Personalizar"}</Btn>}/>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {Object.keys(fases).map(f=><span key={f} onClick={()=>setFunil(f)} style={{fontSize:11,padding:"5px 16px",borderRadius:20,cursor:"pointer",background:funil===f?U.primary:U.bgCard,color:funil===f?"white":U.textSec,border:`1px solid ${funil===f?U.primary:U.border}`,fontWeight:500}}>{f}</span>)}
      </div>
      {editF&&(
        <Crd>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>{fa.map((f,i)=><span key={i} style={{fontSize:11,background:FC[i%6]+"25",color:FT[i%6],padding:"3px 10px",borderRadius:20,display:"flex",gap:5,alignItems:"center"}}>{f}<span onClick={()=>setFases({...fases,[funil]:fa.filter((_,j)=>j!==i)})} style={{cursor:"pointer",fontWeight:700}}>×</span></span>)}</div>
          <div style={{display:"flex",gap:6}}><input value={novaF} onChange={e=>setNovaF(e.target.value)} placeholder="Nova etapa..." style={{flex:1,border:`1px solid ${U.border}`,borderRadius:8,padding:"6px 10px",fontSize:12}}/><Btn variant="primary" onClick={()=>{if(novaF.trim()){setFases({...fases,[funil]:[...fa,novaF.trim()]});setNovaF("");}}}>+</Btn></div>
        </Crd>
      )}
      <div style={{display:"grid",gridTemplateColumns:`repeat(${fa.length},1fr)`,gap:8,overflowX:"auto"}}>
        {fa.map((fase,i)=>{
          const cards=negocios.filter(n=>n.funil===funil&&n.fase===fase);
          const iDrop=dropF===fase;
          return (
            <div key={fase} onDragOver={e=>{e.preventDefault();setDropF(fase);}} onDrop={()=>drop(fase)} onDragLeave={()=>setDropF(null)} style={{background:iDrop?FC[i%6]+"20":U.bg,borderRadius:12,padding:"0.75rem",border:`1.5px solid ${iDrop?FC[i%6]:U.borderLight}`,minWidth:130}}>
              <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:6}}><div style={{width:8,height:8,borderRadius:4,background:FC[i%6]}}/><span style={{fontSize:11,fontWeight:600,color:U.dark}}>{fase}</span></div>
              <div style={{fontSize:10,color:U.textMuted,marginBottom:8}}>{fmtK(cards.reduce((a,n)=>a+n.valor,0))} · {cards.length}</div>
              {cards.map(n=>{const sc=calcScore(n.sinais,n.curva),pm=PRI[getPri(sc)],am=ABC[n.curva];return(<div key={n.id} draggable onDragStart={()=>setDragId(n.id)} style={{background:U.bgCard,border:`1px solid ${U.borderLight}`,borderRadius:10,padding:"8px 10px",marginBottom:6,cursor:"grab"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={{fontSize:11,fontWeight:600,color:U.dark}}>{n.nome}</span><span style={{fontSize:11,color:pm.tc}}>{pm.icon}</span></div><div style={{fontSize:10,color:U.textMuted,marginBottom:5}}>{n.empresa}</div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:11,color:U.primary,fontWeight:600}}>{fmt(n.valor)}</span><span style={{fontSize:10,background:am.bg,color:am.tc,padding:"1px 6px",borderRadius:10}}>{am.icon}</span></div></div>);})}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Negocios({negocios,setNegocios}){
  const [detalhe,setDetalhe]=useState(null);
  const ranqueados=useMemo(()=>[...negocios].map(n=>({...n,score:calcScore(n.sinais,n.curva),prioridade:getPri(calcScore(n.sinais,n.curva))})).sort((a,b)=>(b.flag-a.flag)||(b.score-a.score)),[negocios]);
  const negSel=detalhe!==null?negocios.find(n=>n.id===detalhe):null;
  if(negSel){
    const pm=PRI[getPri(calcScore(negSel.sinais,negSel.curva))];
    const am=ABC[negSel.curva];
    return (
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <Btn onClick={()=>setDetalhe(null)}>← Voltar</Btn>
        <div style={{background:`linear-gradient(135deg,${pm.bg},white)`,border:`1.5px solid ${pm.bdr}`,borderRadius:12,padding:"1rem 1.25rem"}}>
          <div style={{display:"flex",gap:12,alignItems:"center"}}>
            <SGauge score={calcScore(negSel.sinais,negSel.curva)} size={56}/>
            <div style={{flex:1}}>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:4}}>
                <span style={{fontSize:16,fontWeight:700,color:U.dark}}>{negSel.nome}</span>
                <Bdg label={am.full} bg={am.bg} tc={am.tc} bdr={am.bdr}/>
                {negSel.projeto&&<Bdg label={SPROJ[negSel.projeto.statusKey]?.label||""} bg={SPROJ[negSel.projeto.statusKey]?.bg} tc={SPROJ[negSel.projeto.statusKey]?.tc}/>}
              </div>
              <div style={{fontSize:12,color:U.textMuted}}>{negSel.empresa} · {negSel.responsavel} · {fmt(negSel.valor)}</div>
            </div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <Crd>
            <div style={{fontSize:12,fontWeight:600,color:U.dark,marginBottom:8}}>Informações</div>
            {[["Fase",negSel.fase],["Funil",negSel.funil],["Probabilidade",`${negSel.prob}%`],["Previsão",fmtD(negSel.prev)]].map(([l,v])=>(
              <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${U.borderLight}`}}>
                <span style={{fontSize:11,color:U.textMuted}}>{l}</span><span style={{fontSize:12,fontWeight:600,color:U.dark}}>{v}</span>
              </div>
            ))}
            {/* Campo Investimento */}
            <div style={{padding:"8px 0 4px"}}>
              <div style={{fontSize:10,color:U.textMuted,marginBottom:4,fontWeight:500}}>💰 Investimento (prospecção)</div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <input
                  type="number" min="0"
                  defaultValue={negSel.investimento||0}
                  onBlur={e=>setNegocios(ns=>ns.map(n=>n.id===negSel.id?{...n,investimento:Number(e.target.value)||0}:n))}
                  style={{flex:1,border:`1px solid ${U.border}`,borderRadius:8,padding:"6px 10px",fontSize:12,background:U.bgInfo}}
                />
                <span style={{fontSize:10,color:U.textMuted}}>R$</span>
              </div>
              <div style={{fontSize:10,color:U.textMuted,marginTop:3}}>Leads captados:&nbsp;
                <input type="number" min="0" defaultValue={negSel.leads||0}
                  onBlur={e=>setNegocios(ns=>ns.map(n=>n.id===negSel.id?{...n,leads:Number(e.target.value)||0}:n))}
                  style={{width:60,border:`1px solid ${U.border}`,borderRadius:6,padding:"3px 6px",fontSize:11}}
                />
              </div>
              {(negSel.investimento>0&&negSel.leads>0)&&(
                <div style={{marginTop:6,background:U.bgSuccess,borderRadius:8,padding:"4px 10px",display:"inline-block"}}>
                  <span style={{fontSize:11,color:U.success,fontWeight:600}}>CPL: {fmt(negSel.investimento/negSel.leads)}</span>
                </div>
              )}
            </div>
          </Crd>
          <Crd>
            <div style={{fontSize:12,fontWeight:600,color:U.dark,marginBottom:8}}>Sinais ativos</div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              {SINAIS.filter(s=>negSel.sinais?.[s.id]).map(s=><span key={s.id} style={{fontSize:10,background:U.bgSuccess,color:U.success,padding:"2px 7px",borderRadius:8,fontWeight:500}}>{s.icon} {s.label}</span>)}
            </div>
          </Crd>
        </div>
        <Crd>
          <div style={{fontSize:12,fontWeight:600,color:U.dark,marginBottom:8}}>Timeline ({(negSel.timeline||[]).length} eventos)</div>
          {(negSel.timeline||[]).map((ev,i)=>{
            const meta=TMETA[ev.tipo]||TMETA.Tarefa;
            return(
              <div key={ev.id} style={{display:"flex",gap:10,marginBottom:10,padding:"8px 10px",background:U.bg,borderRadius:8}}>
                <span style={{fontSize:12,background:meta.bg,color:meta.tc,padding:"2px 8px",borderRadius:8,height:"fit-content"}}>{meta.icon}</span>
                <div><div style={{fontSize:12,fontWeight:600,color:U.dark}}>{ev.titulo}</div><div style={{fontSize:10,color:U.textMuted}}>{fmtD(ev.data)} · {ev.autor} · {ev.resultado}</div><div style={{fontSize:11,color:U.text,marginTop:3}}>{ev.desc}</div></div>
              </div>
            );
          })}
        </Crd>
      </div>
    );
  }
  return (
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <ST t="Negócios" sub={`${ranqueados.length} negócios`}/>
      {ranqueados.map(n=>{
        const pm=PRI[n.prioridade],am=ABC[n.curva];
        return (
          <div key={n.id} onClick={()=>setDetalhe(n.id)} style={{background:U.bgCard,border:`1px solid ${U.borderLight}`,borderLeft:`4px solid ${pm.bdr}`,borderRadius:12,padding:"0.9rem 1.25rem",cursor:"pointer"}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <SGauge score={n.score} size={46}/>
              <div style={{flex:1}}>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:3,alignItems:"center"}}>
                  <span style={{fontWeight:600,fontSize:13,color:U.dark}}>{n.nome}</span>
                  {n.flag&&<span>🚩</span>}
                  <Bdg label={n.fase} bg={U.bgInfo} tc={U.primary} fs={10}/>
                  <Bdg label={am.full} bg={am.bg} tc={am.tc} bdr={am.bdr} fs={10}/>
                </div>
                <div style={{fontSize:11,color:U.textMuted}}>{n.empresa} · {n.responsavel}</div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontSize:14,fontWeight:700,color:U.primary}}>{fmt(n.valor)}</div>
                <div style={{fontSize:10,color:U.textMuted}}>{n.prob}%</div>
                {n.investimento>0&&<div style={{fontSize:10,color:U.warning,marginTop:2}}>💰 {fmtK(n.investimento)}</div>}
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function Scoring({negocios,setNegocios}){
  const [filtro,setFiltro]=useState("Todos");
  const ranqueados=useMemo(()=>[...negocios].map(n=>({...n,score:calcScore(n.sinais,n.curva),prioridade:getPri(calcScore(n.sinais,n.curva))})).sort((a,b)=>(b.flag-a.flag)||(b.score-a.score)),[negocios]);
  const filtrados=filtro==="Todos"?ranqueados:ranqueados.filter(n=>n.prioridade===filtro);
  return (
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <ST t="Lead Scoring" sub="Priorização inteligente"/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
        {["Alta","Media","Baixa"].map(p=>{const pm=PRI[p],n=ranqueados.filter(x=>x.prioridade===p).length;return(<div key={p} onClick={()=>setFiltro(filtro===p?"Todos":p)} style={{background:filtro===p?`linear-gradient(135deg,${pm.bg},white)`:U.bgCard,border:`${filtro===p?"2":"1"}px solid ${filtro===p?pm.bdr:U.borderLight}`,borderRadius:12,padding:"1rem",cursor:"pointer"}}><div style={{display:"flex",gap:6,alignItems:"center",marginBottom:5}}><span style={{color:pm.tc,fontWeight:700,fontSize:16}}>{pm.icon}</span><span style={{fontSize:12,fontWeight:600,color:pm.tc}}>Prioridade {p}</span></div><div style={{fontSize:28,fontWeight:700,color:pm.tc}}>{n}</div><div style={{fontSize:10,color:U.textMuted}}>{pm.prazo}</div></div>);})}
      </div>
      <div style={{display:"flex",gap:6}}>{["Todos","Alta","Media","Baixa"].map(f=><span key={f} onClick={()=>setFiltro(f)} style={{fontSize:11,padding:"4px 14px",borderRadius:20,cursor:"pointer",background:filtro===f?U.primary:U.bgCard,color:filtro===f?"white":U.textSec,border:`1px solid ${filtro===f?U.primary:U.border}`,fontWeight:500}}>{f}</span>)}</div>
      {filtrados.map((n,idx)=>{
        const pm=PRI[n.prioridade],am=ABC[n.curva],ativ=SINAIS.filter(s=>n.sinais?.[s.id]);
        return (
          <div key={n.id} style={{background:U.bgCard,border:`1px solid ${U.borderLight}`,borderLeft:`4px solid ${pm.bdr}`,borderRadius:12,padding:"0.9rem 1.25rem"}}>
            <div style={{display:"flex",gap:12}}>
              <div style={{textAlign:"center",flexShrink:0}}><div style={{fontSize:9,color:U.textMuted,marginBottom:2}}>#{idx+1}</div><SGauge score={n.score} size={46}/></div>
              <div style={{flex:1}}>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:3,alignItems:"center"}}>
                  <span style={{fontWeight:600,fontSize:13,color:U.dark}}>{n.nome}</span>
                  {n.flag&&<span>🚩</span>}
                  <Bdg label={am.full} bg={am.bg} tc={am.tc} bdr={am.bdr} fs={10}/>
                </div>
                <div style={{fontSize:11,color:U.textMuted,marginBottom:6}}>{n.empresa} · {n.fase}</div>
                <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                  {ativ.length===0?<span style={{fontSize:10,color:U.textMuted}}>Nenhum sinal</span>:ativ.map(s=><span key={s.id} style={{fontSize:10,background:U.bgSuccess,color:U.success,padding:"2px 7px",borderRadius:8,fontWeight:500}}>{s.icon} {s.label}</span>)}
                </div>
              </div>
              <div style={{fontSize:14,fontWeight:700,color:U.primary,flexShrink:0}}>{fmt(n.valor)}</div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function Atividades({tarefas,setTarefas}){
  const [abaAtiv,setAbaAtiv]=useState("dashboard");
  const [filtro,setFiltro]=useState("Todas");
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({titulo:"",empresa:"",neg:"",tipo:"Tarefa",prazo:"",responsavel:"",prioridade:"Media"});

  const sCor={Vencida:[U.bgDanger,U.danger],Pendente:[U.bgWarning,U.warning],Futura:[U.bg,U.textSec],Concluida:[U.bgSuccess,U.success]};
  const pCor={Alta:[U.bgDanger,U.danger],Media:[U.bgWarning,U.warning],Baixa:[U.bg,U.textSec]};
  const filtradas=filtro==="Todas"?tarefas:tarefas.filter(t=>t.status===filtro);

  // Métricas
  const vencidas=tarefas.filter(t=>t.status==="Vencida");
  const pendentes=tarefas.filter(t=>t.status==="Pendente");
  const concluidas=tarefas.filter(t=>t.status==="Concluida");
  const total=tarefas.length||1;
  const taxaConclusao=Math.round(concluidas.length/total*100);
  const taxaVencimento=Math.round(vencidas.length/total*100);

  // Por tipo
  const porTipo=Object.entries(TMETA).map(([tipo,meta])=>({
    tipo,meta,n:tarefas.filter(t=>t.tipo===tipo).length,
    c:tarefas.filter(t=>t.tipo===tipo&&t.status==="Concluida").length
  })).filter(x=>x.n>0).sort((a,b)=>b.n-a.n);

  // Por responsável
  const porResp=[...new Set(tarefas.map(t=>t.responsavel).filter(Boolean))].map(r=>({
    resp:r,
    total:tarefas.filter(t=>t.responsavel===r).length,
    venc:tarefas.filter(t=>t.responsavel===r&&t.status==="Vencida").length,
    pend:tarefas.filter(t=>t.responsavel===r&&t.status==="Pendente").length,
    conc:tarefas.filter(t=>t.responsavel===r&&t.status==="Concluida").length,
  })).sort((a,b)=>b.total-a.total);

  // Alta prioridade pendentes/vencidas
  const urgentes=tarefas.filter(t=>t.prioridade==="Alta"&&t.status!=="Concluida").sort((a,b)=>a.prazo>b.prazo?1:-1);

  const BOAS_PRATICAS=[
    {icon:"⚡",titulo:"Regra 24h",desc:"Toda atividade de Alta prioridade deve ser executada em até 24 horas. Resposta rápida aumenta em 7x a taxa de conversão (Harvard Business Review).",cor:U.danger,bg:U.bgDanger},
    {icon:"📅",titulo:"Cadência 3-2-1",desc:"Para cada lead novo: 3 tentativas de contato nos primeiros 3 dias, 2 follow-ups na semana 2, 1 contato mensal de nutrição. Cadência estruturada gera +50% de reuniões agendadas.",cor:"#7C3AED",bg:"#EDE9FE"},
    {icon:"🎯",titulo:"Foco no Decisor",desc:"Identifique e concentre atividades no tomador de decisão desde o início. Negócios com contato direto com o decisor fecham 2,3x mais rápido.",cor:U.primary,bg:U.bgInfo},
    {icon:"📞",titulo:"Ligação antes do e-mail",desc:"Inicie o contato por ligação; use e-mail como confirmação. Combinação ligação + e-mail tem 8x mais engajamento do que e-mail isolado (SalesLoft).",cor:U.success,bg:U.bgSuccess},
    {icon:"📊",titulo:"Review Semanal",desc:"Revise seu pipeline toda segunda-feira: priorize tarefas vencidas primeiro, atualize probabilidades e identifique negócios estagnados há mais de 14 dias.",cor:U.warning,bg:U.bgWarning},
    {icon:"🤝",titulo:"Post-meeting Action",desc:"Registre sempre a próxima ação imediatamente após toda reunião ou ligação. Equipes com 100% de registro de próximos passos fecham 35% mais negócios.",cor:"#0D9488",bg:"#CCFBF1"},
  ];

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {/* Header com abas */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:17,fontWeight:700,color:U.dark}}>Atividades e Tarefas</div>
          <div style={{fontSize:11,color:U.textMuted,marginTop:2}}>{tarefas.length} total · {vencidas.length} vencidas · {pendentes.length} pendentes · {concluidas.length} concluídas</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <Btn variant="primary" onClick={()=>setShowForm(!showForm)}>{showForm?"Cancelar":"+ Nova"}</Btn>
        </div>
      </div>

      {/* Sub-navegação */}
      <div style={{display:"flex",gap:2,borderBottom:`1px solid ${U.borderLight}`}}>
        {[{id:"dashboard",l:"📊 Dashboard"},{id:"lista",l:"📋 Lista"},{id:"boas",l:"💡 Boas Práticas"}].map(t=>(
          <div key={t.id} onClick={()=>setAbaAtiv(t.id)} style={{fontSize:12,padding:"8px 18px",cursor:"pointer",borderBottom:abaAtiv===t.id?`2px solid ${U.primary}`:"2px solid transparent",color:abaAtiv===t.id?U.primary:U.textSec,fontWeight:abaAtiv===t.id?600:400}}>{t.l}</div>
        ))}
      </div>

      {/* Formulário nova tarefa */}
      {showForm&&(
        <Crd>
          <div style={{fontSize:12,fontWeight:700,color:U.dark,marginBottom:10}}>Nova Atividade</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            {[["titulo","Título *"],["empresa","Empresa"],["responsavel","Responsável"]].map(([k,l])=>(
              <div key={k}><div style={{fontSize:10,color:U.textMuted,marginBottom:3,fontWeight:500}}>{l}</div><input value={form[k]} onChange={e=>setForm({...form,[k]:e.target.value})} placeholder={l} style={{width:"100%",boxSizing:"border-box",border:`1px solid ${U.border}`,borderRadius:8,padding:"7px 10px",fontSize:12}}/></div>
            ))}
            <div>
              <div style={{fontSize:10,color:U.textMuted,marginBottom:3,fontWeight:500}}>Prazo</div>
              <input type="date" value={form.prazo} onChange={e=>setForm({...form,prazo:e.target.value})} style={{width:"100%",boxSizing:"border-box",border:`1px solid ${U.border}`,borderRadius:8,padding:"7px 10px",fontSize:12}}/>
            </div>
            <div>
              <div style={{fontSize:10,color:U.textMuted,marginBottom:3,fontWeight:500}}>Tipo</div>
              <select value={form.tipo} onChange={e=>setForm({...form,tipo:e.target.value})} style={{width:"100%",border:`1px solid ${U.border}`,borderRadius:8,padding:"7px 10px",fontSize:12}}>
                {Object.keys(TMETA).map(t=><option key={t}>{t}</option>)}

            </div>
            <div>
              <div style={{fontSize:10,color:U.textMuted,marginBottom:3,fontWeight:500}}>Prioridade</div>
              <select value={form.prioridade} onChange={e=>setForm({...form,prioridade:e.target.value})} style={{width:"100%",border:`1px solid ${U.border}`,borderRadius:8,padding:"7px 10px",fontSize:12}}>
                <option>Alta</option><option>Media</option><option>Baixa</option>
              </select>
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <Btn variant="primary" onClick={()=>{if(!form.titulo)return;setTarefas(ts=>[...ts,{...form,id:Date.now(),status:"Pendente"}]);setShowForm(false);}}>Salvar</Btn>
            <Btn onClick={()=>setShowForm(false)}>Cancelar</Btn>
          </div>
        </Crd>

      {/* ── DASHBOARD ── */}

        <div style={{display:"flex",flexDirection:"column",gap:14}}>

              {label:"Vencidas",v:vencidas.length,pct:taxaVencimento,grad:`linear-gradient(135deg,${U.danger},#F87171)`,icon:"🔴",alerta:true},
              {label:"Pendentes",v:pendentes.length,pct:Math.round(pendentes.length/total*100),grad:`linear-gradient(135deg,${U.warning},#FBBF24)`,icon:"⏳"},
              {label:"Concluídas",v:concluidas.length,pct:taxaConclusao,grad:`linear-gradient(135deg,${U.success},#34D399)`,icon:"✅"},
              {label:"Total",v:tarefas.length,pct:100,grad:`linear-gradient(135deg,${U.primary},${U.light})`,icon:"📋"},
            ].map(({label,v,pct:p,grad,icon,alerta})=>(
              <div key={label} style={{background:grad,borderRadius:14,padding:"1.1rem",color:"white",boxShadow:"0 4px 12px rgba(0,87,184,0.15)",position:"relative",overflow:"hidden"}}>

            <div style={{fontSize:12,fontWeight:700,color:U.dark,marginBottom:10}}>Evolução Geral das Tarefas</div>
            <div style={{display:"flex",gap:0,borderRadius:99,overflow:"hidden",height:18,marginBottom:8}}>
              {[
                {n:concluidas.length,c:U.success,label:"Concluídas"},
                {n:pendentes.length,c:U.warning,label:"Pendentes"},
                {n:vencidas.length,c:U.danger,label:"Vencidas"},
              ].map(({n,c,label})=>n>0&&(
                <div key={label} style={{width:`${Math.round(n/total*100)}%`,background:c,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"white",fontWeight:700,minWidth:n>0?24:0,transition:"width .4s"}}>
                  {Math.round(n/total*100)>8?`${Math.round(n/total*100)}%`:""}
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:16}}>
              {[{c:U.success,l:"Concluídas",n:concluidas.length},{c:U.warning,l:"Pendentes",n:pendentes.length},{c:U.danger,l:"Vencidas",n:vencidas.length}].map(({c,l,n})=>(
                <div key={l} style={{display:"flex",alignItems:"center",gap:5}}>
                  <div style={{width:8,height:8,borderRadius:4,background:c}}/>
                  <span style={{fontSize:11,color:U.textSec}}>{l}: <strong style={{color:U.dark}}>{n}</strong></span>
                </div>
              ))}
            </div>
          </Crd>

          {/* Urgentes + Por tipo */}
          <div style={{display:"grid",gridTemplateColumns:"1.2fr 1fr",gap:14}}>

            {/* Urgentes */}
            <Crd>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                <div style={{width:8,height:8,borderRadius:4,background:U.danger}}/>
                <div style={{fontSize:12,fontWeight:700,color:U.dark}}>🚨 Alta Prioridade — Ação Imediata</div>
              </div>
              {urgentes.length===0?(
                <div style={{textAlign:"center",padding:"1rem",color:U.success,fontSize:12}}>✅ Nenhuma tarefa urgente pendente!</div>
              ):urgentes.map(t=>{
                const meta=TMETA[t.tipo]||TMETA.Tarefa;
                const[sb,st]=sCor[t.status]||[U.bg,U.textSec];
                const diasR=t.prazo?diasAte(t.prazo):null;
                return(
                  <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:`1px solid ${U.borderLight}`}}>
                    <div style={{width:28,height:28,borderRadius:14,background:meta.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,flexShrink:0}}>{meta.icon}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:12,fontWeight:600,color:U.dark}}>{t.titulo}</div>
                      <div style={{fontSize:10,color:U.textMuted}}>{t.empresa}{t.responsavel?` · ${t.responsavel}`:""}</div>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <Bdg label={t.status} bg={sb} tc={st} fs={9}/>
                      {diasR!==null&&<div style={{fontSize:9,color:diasR<=0?U.danger:U.warning,fontWeight:600,marginTop:2}}>{diasR<=0?"VENCIDA":diasR===0?"Hoje":diasR===1?"Amanhã":`${diasR}d`}</div>}
                    </div>
                  </div>
                );
              })}

            {/* Por tipo */}
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <Crd style={{flex:1}}>
                <div style={{fontSize:12,fontWeight:700,color:U.dark,marginBottom:12}}>Distribuição por Canal</div>
                {porTipo.map(({tipo,meta,n,c})=>(
                  <div key={tipo} style={{marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                      <div style={{display:"flex",gap:6,alignItems:"center"}}>
                        <div style={{width:24,height:24,borderRadius:12,background:meta.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11}}>{meta.icon}</div>
                        <span style={{fontSize:11,color:U.textSec}}>{meta.label}</span>
                      </div>
                      <div style={{display:"flex",gap:6,alignItems:"center"}}>
                        <span style={{fontSize:11,fontWeight:600,color:U.dark}}>{n}</span>
                        {c>0&&<Bdg label={`${c} ✓`} bg={U.bgSuccess} tc={U.success} fs={9}/>}
                      </div>
                    </div>
                    <PBar pct={Math.round(n/total*100)} h={5} color={meta.tc}/>
                  </div>
                ))}
              </Crd>
            </div>
          </div>

          {/* Por responsável */}
          {porResp.length>0&&(
            <Crd>
              <div style={{fontSize:12,fontWeight:700,color:U.dark,marginBottom:12}}>Performance por Responsável</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:10}}>
                {porResp.map((r,i)=>{
                  const txC=r.total>0?Math.round(r.conc/r.total*100):0;
                  return(
                    <div key={r.resp} style={{background:U.bg,borderRadius:12,padding:"0.85rem",border:`1px solid ${U.borderLight}`}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                        <div style={{width:32,height:32,borderRadius:16,background:`linear-gradient(135deg,${FC[i%6]},${FC[(i+2)%6]})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"white",flexShrink:0}}>
                          {r.resp.split(" ").map(x=>x[0]).join("").slice(0,2)}
                        </div>
                        <div style={{flex:1}}>
                          <div style={{fontSize:12,fontWeight:600,color:U.dark}}>{r.resp}</div>
                          <div style={{fontSize:10,color:U.textMuted}}>{r.total} tarefa{r.total!==1?"s":""}</div>
                        </div>
                        <div style={{fontSize:13,fontWeight:700,color:txC>=70?U.success:txC>=40?U.warning:U.danger}}>{txC}%</div>
                      </div>
                      <div style={{display:"flex",gap:6,marginBottom:6}}>
                        {r.venc>0&&<Bdg label={`${r.venc} venc.`} bg={U.bgDanger} tc={U.danger} fs={9}/>}
                        {r.pend>0&&<Bdg label={`${r.pend} pend.`} bg={U.bgWarning} tc={U.warning} fs={9}/>}

                      </div>

                    </div>
                  );
                })}
              </div>
            </Crd>
          )}

        </div>

      {/* ── LISTA ── */}
      {abaAtiv==="lista"&&(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {["Todas","Vencida","Pendente","Concluida"].map(s=>(
              <span key={s} onClick={()=>setFiltro(s)} style={{fontSize:11,padding:"4px 14px",borderRadius:20,cursor:"pointer",background:filtro===s?U.primary:U.bgCard,color:filtro===s?"white":U.textSec,border:`1px solid ${filtro===s?U.primary:U.border}`,fontWeight:500}}>

          {filtradas.length===0&&<div style={{textAlign:"center",padding:"2rem",color:U.textMuted}}>Nenhuma tarefa nesta categoria.</div>}

            const meta=TMETA[t.tipo]||TMETA.Tarefa;
            const[sb,st]=sCor[t.status]||[U.bg,U.textSec];
            const[pb,pt]=pCor[t.prioridade]||[U.bg,U.textSec];
            const diasR=t.prazo?diasAte(t.prazo):null;
            return(
              <Crd key={t.id} style={{padding:"0.8rem 1.25rem",borderLeft:`3px solid ${st}`}}>

                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:12,color:U.dark}}>{t.titulo}</div>
                    <div style={{fontSize:10,color:U.textMuted,marginTop:2}}>{t.empresa}{t.neg?` · ${t.neg}`:""}{t.responsavel?` · ${t.responsavel}`:""}</div>

                  <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
                    <Bdg label={t.prioridade} bg={pb} tc={pt}/>
                    <Bdg label={t.status} bg={sb} tc={st}/>
                    {diasR!==null&&(
                      <div style={{fontSize:10,fontWeight:600,color:diasR<=0?U.danger:diasR<=2?U.warning:U.textMuted}}>
                        {diasR<=0?"Vencida":diasR===0?"Hoje":diasR===1?"Amanhã":`${fmtD(t.prazo)}`}

        <KPI label="LL" value={fmtK(totais.ll)} sub={`Margem: ${fmtP(totais.rol>0?totais.ll/totais.rol*100:0)}`} icon="✅" grad={totais.ll>=0?"linear-gradient(135deg,#065F46,#1D9E75)":"linear-gradient(135deg,#DC2626,#F87171)"}/>
      </div>
      <div style={{display:"flex",gap:2,borderBottom:`1px solid ${U.borderLight}`}}>
        {[{id:"estoque",l:"Estoque"},{id:"vendas",l:"Por Venda"}].map(t=>(<div key={t.id} onClick={()=>setTab(t.id)} style={{fontSize:12,padding:"8px 18px",cursor:"pointer",borderBottom:tab===t.id?`2px solid ${U.primary}`:"2px solid transparent",color:tab===t.id?U.primary:U.textSec,fontWeight:tab===t.id?600:400}}>{t.l}</div>))}
      </div>
      {tab==="estoque"&&(
        <Crd style={{padding:"0.5rem 0",overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
            <thead><tr style={{borderBottom:`2px solid ${U.borderLight}`}}>{["Item","Tipo","Estoque","Mínimo","Custo unit.","Valor total","Status"].map(h=><th key={h} style={th}>{h}</th>)}</tr></thead>
            <tbody>
              {itens.map((it,i)=>{const tm=TIPO_ITEM[it.tipo]||TIPO_ITEM.Equipamento,sm=STATUS_ITEM[it.status]||STATUS_ITEM.Disponivel,baixo=it.qtdEstoque<=it.qtdMin;return(<tr key={it.id} style={{borderBottom:`1px solid ${U.borderLight}`,background:baixo?"#FFF5F5":i%2===0?"white":U.bg}}><td style={{padding:"9px 10px",fontWeight:600,color:U.dark}}>{it.nome}</td><td style={{padding:"9px 10px"}}><Bdg label={tm.icon+" "+it.tipo} bg={tm.bg} tc={tm.tc} fs={9}/></td><td style={{padding:"9px 10px",fontWeight:700,color:baixo?U.danger:U.dark}}>{it.qtdEstoque}</td><td style={{padding:"9px 10px",color:U.textMuted}}>{it.qtdMin}</td><td style={{padding:"9px 10px",fontWeight:600,color:U.primary}}>{fmt(it.custoUnit)}</td><td style={{padding:"9px 10px",fontWeight:600,color:U.dark}}>{fmt(it.custoUnit*it.qtdEstoque)}</td><td style={{padding:"9px 10px"}}><Bdg label={sm.label} bg={sm.bg} tc={sm.tc} bdr={sm.bdr} fs={9}/></td></tr>);})}
            </tbody>
          </table>
        </Crd>
      )}
      {tab==="vendas"&&(
        <Crd style={{padding:"0.5rem 0",overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
            <thead><tr style={{borderBottom:`2px solid ${U.borderLight}`}}>{["Venda","Cliente","Status","ROB","ROL","L.Bruto","LL","Mg%"].map(h=><th key={h} style={th}>{h}</th>)}</tr></thead>
            <tbody>
              {vendasCalc.map((v,i)=>{const sv=STATUS_VENDA[v.status]||STATUS_VENDA.Rascunho,mg=v.rol>0?v.ll/v.rol*100:0;return(<tr key={v.id} style={{borderBottom:`1px solid ${U.borderLight}`,background:i%2===0?"white":U.bg}}><td style={{padding:"9px 10px",fontWeight:700,color:U.primary}}>{v.id}</td><td style={{padding:"9px 10px",fontWeight:600,color:U.dark}}>{v.cliente}</td><td style={{padding:"9px 10px"}}><Bdg label={sv.label} bg={sv.bg} tc={sv.tc} fs={9}/></td><td style={{padding:"9px 10px",fontWeight:700,color:U.primary}}>{fmtK(v.rob)}</td><td style={{padding:"9px 10px",color:U.dark}}>{fmtK(v.rol)}</td><td style={{padding:"9px 10px",fontWeight:700,color:v.lucroBruto>=0?U.success:U.danger}}>{fmtK(v.lucroBruto)}</td><td style={{padding:"9px 10px",fontWeight:700,color:v.ll>=0?U.success:U.danger}}>{fmtK(v.ll)}</td><td style={{padding:"9px 10px"}}><Bdg label={fmtP(mg)} bg={mg>=20?U.bgSuccess:mg>=10?U.bgWarning:U.bgDanger} tc={mg>=20?U.success:mg>=10?U.warning:U.danger} fs={10}/></td></tr>);})}
            </tbody>
          </table>
        </Crd>
      )}
    </div>
  );
}

// OKR DASHBOARD MODULE
// ═══════════════════════════════════════════════════════════════
function OKRDashboard({data,setData}){
  const [tab,setTab]=useState("dashboard");
  const [editIdx,setEditIdx]=useState(null);
  const [form,setForm]=useState({});
  const [aiText,setAiText]=useState("");
  const [aiLoading,setAiLoading]=useState(false);
  const [toast,setToast]=useState("");

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(""),2500);};

  const totals=data.reduce((acc,r)=>({eventos:acc.eventos+num(r.eventos),leads:acc.leads+num(r.leads),mqls:acc.mqls+num(r.mqls),sqls:acc.sqls+num(r.sqls),presencial:acc.presencial+num(r.presencial),online:acc.online+num(r.online),custo:acc.custo+num(r.custo),clientes:acc.clientes+num(r.clientes)}),{eventos:0,leads:0,mqls:0,sqls:0,presencial:0,online:0,custo:0,clientes:0});

  const mesesComDados=data.filter(r=>r.saved&&num(r.leads)>0);
  const taxaMQL=totals.leads>0?((totals.mqls/totals.leads)*100).toFixed(1):null;
  const taxaSQL=totals.mqls>0?((totals.sqls/totals.mqls)*100).toFixed(1):null;
  const cacTotal=totals.clientes>0?totals.custo/totals.clientes:0;
  const custoPorLead=totals.leads>0?totals.custo/totals.leads:0;
  const totalVisitas=totals.presencial+totals.online;
  const mixPres=totalVisitas>0?Math.round(totals.presencial/totalVisitas*100):0;

  const openEdit=idx=>{setEditIdx(idx);setForm({...data[idx]});setTab("lancar");};
  const saveForm=()=>{setData(data.map((r,i)=>i===editIdx?{...r,...form,saved:true}:r));setEditIdx(null);setForm({});setTab("historico");showToast("Indicadores salvos!");};

  const getAi=useCallback(async()=>{
    setAiLoading(true);setAiText("");
    const resumo=mesesComDados.map(r=>{const cac=num(r.clientes)>0?(num(r.custo)/num(r.clientes)).toFixed(0):"—";return`${r.mes}: ${r.eventos} eventos, custo R$${num(r.custo).toLocaleString("pt-BR")}, ${r.leads} leads, ${r.mqls} MQLs, ${r.sqls} SQLs, ${r.clientes} clientes, CAC R$${cac}`;}).join("\n");
    const prompt=`Você é analista de marketing B2B especialista em eventos TIC.\n\nMetas: 8 eventos, 320 leads, 96 MQLs, 15 SQLs.\n\nAcumulado: eventos ${totals.eventos}/8, custo R$${totals.custo.toLocaleString("pt-BR")}, leads ${totals.leads}/320, MQLs ${totals.mqls}/96, SQLs ${totals.sqls}/15, clientes ${totals.clientes}, CAC R$${Math.round(cacTotal).toLocaleString("pt-BR")}, taxa MQL ${taxaMQL||0}%, taxa SQL ${taxaSQL||0}%.\n\nHistórico:\n${resumo||"Nenhum dado."}\n\nAnalise em 4 parágrafos: 1) Status OKR 2) Eficiência financeira CAC/LTV 3) Canal presencial vs online 4) 2-3 recomendações. Tom executivo, português.`;
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
      const d=await res.json();
      setAiText(d.content?.map(b=>b.text||"").join("")||"Sem resposta.");
    }catch{setAiText("Erro ao conectar.");}
    setAiLoading(false);
  },[totals,taxaMQL,taxaSQL,cacTotal,custoPorLead,mesesComDados]);

  const inpOKR=(key,label,hint,prefix)=>(
    <div style={{marginBottom:"0.875rem"}}>
      <label style={{display:"block",fontSize:11,color:U.textSec,marginBottom:4,fontWeight:500}}>{label}{hint&&<span style={{fontSize:10,color:U.textMuted}}> {hint}</span>}</label>
      <div style={{position:"relative"}}>
        {prefix&&<span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",fontSize:12,color:U.textMuted,pointerEvents:"none"}}>{prefix}</span>}
        <input type="number" min="0" value={form[key]??""} onChange={e=>setForm(f=>({...f,[key]:e.target.value}))} placeholder="0" style={{width:"100%",boxSizing:"border-box",background:U.bgCard,border:`1px solid ${U.border}`,borderRadius:9,padding:prefix?"9px 12px 9px 30px":"9px 12px",color:U.dark,fontSize:14,outline:"none",fontFamily:"inherit"}}/>
      </div>
    </div>
  );

  const tabs=[["dashboard","Painel"],["lancar","Lançar"],["historico","Histórico"],["cac","CAC & LTV"],["analise","Análise IA"]];

  return (
    <div style={{background:U.bg,position:"relative"}}>
      {toast&&<div style={{position:"fixed",top:16,right:16,background:U.primary,color:"#fff",padding:"10px 18px",borderRadius:10,fontSize:13,fontWeight:500,zIndex:999,border:`1px solid ${U.cyan}`,boxShadow:"0 4px 16px rgba(0,87,184,0.25)"}}>{toast}</div>}

      {/* Sub-header OKR */}
      <div style={{background:`linear-gradient(135deg,${U.bgSide} 0%,${U.dark} 50%,${U.primary} 100%)`,borderRadius:"0 0 16px 16px",padding:"1.25rem 1.75rem 1rem",marginBottom:"1.5rem",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",inset:0,backgroundImage:`linear-gradient(rgba(0,200,240,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,240,0.05) 1px,transparent 1px)`,backgroundSize:"32px 32px"}}/>
        <div style={{position:"relative",zIndex:1,display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.9rem"}}>
          <div style={{fontSize:14,fontWeight:700,color:"white",display:"flex",alignItems:"center",gap:8}}>
            <span style={{background:"rgba(0,200,240,0.2)",border:"1px solid rgba(0,200,240,0.4)",borderRadius:8,padding:"3px 10px",fontSize:10,letterSpacing:1,textTransform:"uppercase"}}>OKR</span>
            Eventos TIC B2B · 2025
          </div>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.45)",textTransform:"uppercase",letterSpacing:1}}>Acompanhamento de indicadores</div>
        </div>
        <div style={{display:"flex",gap:2}}>
          {tabs.map(([t,l])=>(
            <button key={t} onClick={()=>{setTab(t);setEditIdx(null);}} style={{padding:"8px 16px",fontSize:11,fontWeight:600,background:tab===t?"rgba(255,255,255,0.15)":"none",border:"none",borderBottom:tab===t?`2px solid ${U.cyan}`:"2px solid transparent",color:tab===t?"white":"rgba(255,255,255,0.45)",cursor:"pointer",textTransform:"uppercase",letterSpacing:0.8,borderRadius:"6px 6px 0 0",transition:"all .15s"}}>{l}</button>
          ))}
        </div>
      </div>
      <div style={{padding:"0 1.75rem 1.75rem"}}>
        {tab==="dashboard"&&(
          <>
            <SectionTitleOKR>Indicadores do objetivo</SectionTitleOKR>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:"1.25rem"}}>
              <KpiCardOKR label="Eventos" atual={totals.eventos} meta={METAS_OKR.eventos} dot="cyan"/>
              <KpiCardOKR label="Leads" atual={totals.leads} meta={METAS_OKR.leads} dot="amber"/>
              <KpiCardOKR label="MQLs" atual={totals.mqls} meta={METAS_OKR.mqls} dot="green"/>
              <KpiCardOKR label="SQLs" atual={totals.sqls} meta={METAS_OKR.sqls} dot="coral"/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:"1.25rem"}}>
              <GlassCard title="Taxas de conversão">
                <MetricRow label="Taxa MQL (leads → qualificados)" val={taxaMQL?taxaMQL+"%":"—"} badge="meta 30%" badgeColor={taxaMQL&&parseFloat(taxaMQL)>=30?"ok":"ref"}/>
                <MetricRow label="Taxa SQL (MQL → oportunidade)" val={taxaSQL?taxaSQL+"%":"—"} badge="meta 15%" badgeColor={taxaSQL&&parseFloat(taxaSQL)>=15?"ok":"ref"}/>
                <MetricRow label="Leads por evento" val={totals.eventos>0?(totals.leads/totals.eventos).toFixed(1):"—"}/>
                <MetricRow label="Custo por lead" val={totals.leads>0?brl(custoPorLead):"—"}/>
              </GlassCard>
              <GlassCard title="Canal de visitação">
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                  {[{icon:"🏢",label:"Presencial",val:totals.presencial,c:U.primary},{icon:"💻",label:"Online",val:totals.online,c:U.light}].map(({icon,label,val,c})=>(
                    <div key={label} style={{background:U.bgInfo,border:`1px solid ${U.border}`,borderRadius:12,padding:"0.875rem",textAlign:"center"}}>
                      <div style={{fontSize:20,marginBottom:5}}>{icon}</div>
                      <div style={{fontSize:10,color:U.textMuted,textTransform:"uppercase",letterSpacing:0.8}}>{label}</div>
                      <div style={{fontSize:22,fontWeight:700,color:c}}>{val.toLocaleString("pt-BR")}</div>
                    </div>
                  ))}
                </div>
                <PBar pct={mixPres} h={8} color={U.primary}/>
                <div style={{display:"flex",justifyContent:"space-between",marginTop:5}}>
                  <span style={{fontSize:10,color:U.textMuted}}>{mixPres}% presencial</span>
                  <span style={{fontSize:10,color:U.textMuted}}>{100-mixPres}% online</span>
                </div>
              </GlassCard>
            </div>
            <SectionTitleOKR>CAC & custo de aquisição</SectionTitleOKR>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
              <CacItem label="Custo total dos eventos" val={totals.custo>0?brl(totals.custo):"—"} sub="investimento acumulado"/>
              <CacItem label="CAC médio" val={totals.clientes>0?brl(cacTotal):"—"} sub="custo / clientes gerados"/>
              <CacItem label="Clientes gerados" val={totals.clientes} sub="convertidos no período"/>
            </div>
            <SectionTitleOKR>Progresso mensal</SectionTitleOKR>
            <GlassCard>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",minWidth:520}}>
                  <thead><tr>{["Mês","Eventos","Leads","MQLs","SQLs","Custo","CAC"].map(h=>(<th key={h} style={{fontSize:9,fontWeight:700,color:U.primary,textTransform:"uppercase",letterSpacing:1,padding:"0 10px 10px",textAlign:"left"}}>{h}</th>))}</tr></thead>
                  <tbody>
                    {data.map((r,i)=>{const cac=num(r.clientes)>0?brl(num(r.custo)/num(r.clientes)):null;return(<tr key={i} onClick={()=>openEdit(i)} style={{cursor:"pointer",borderRadius:8}} onMouseEnter={e=>e.currentTarget.style.background=U.bg} onMouseLeave={e=>e.currentTarget.style.background="transparent"}><td style={{fontSize:12,fontWeight:600,color:U.dark,padding:"9px 10px",borderTop:`1px solid ${U.borderLight}`}}>{r.mes}</td>{r.saved?(<><td style={{fontSize:12,color:U.text,padding:"9px 10px",borderTop:`1px solid ${U.borderLight}`}}>{num(r.eventos)}</td><td style={{fontSize:12,color:U.text,padding:"9px 10px",borderTop:`1px solid ${U.borderLight}`}}>{num(r.leads)}</td><td style={{fontSize:12,color:U.text,padding:"9px 10px",borderTop:`1px solid ${U.borderLight}`}}>{num(r.mqls)}</td><td style={{fontSize:12,color:U.text,padding:"9px 10px",borderTop:`1px solid ${U.borderLight}`}}>{num(r.sqls)}</td><td style={{fontSize:12,color:U.primary,fontWeight:600,padding:"9px 10px",borderTop:`1px solid ${U.borderLight}`}}>{num(r.custo)>0?brl(num(r.custo)):"—"}</td><td style={{fontSize:12,color:cac?U.success:U.textMuted,fontWeight:cac?600:400,padding:"9px 10px",borderTop:`1px solid ${U.borderLight}`}}>{cac||"—"}</td></>):(<td colSpan={6} style={{fontSize:12,color:U.textMuted,fontStyle:"italic",padding:"9px 10px",borderTop:`1px solid ${U.borderLight}`}}>— sem dados · clique para lançar</td>)}</tr>);})}
                  </tbody>
                </table>
              </div>
            </GlassCard>
          </>
        )}

        {tab==="lancar"&&(
          <>
            {editIdx===null?(
              <>
                <SectionTitleOKR>Selecione o mês</SectionTitleOKR>
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
                  {data.map((r,i)=>(
                    <button key={i} onClick={()=>openEdit(i)} style={{padding:"14px 10px",borderRadius:12,border:`1px solid ${r.saved?U.success:U.border}`,background:r.saved?U.bgSuccess:U.bgCard,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,transition:"all .15s"}}>
                      <span style={{fontSize:14,fontWeight:600,color:r.saved?U.success:U.dark}}>{r.mes}</span>
                      {r.saved?<span style={{fontSize:10,color:U.success}}>{num(r.leads)} leads · {brl(num(r.custo))}</span>:<span style={{fontSize:10,color:U.textMuted}}>lançar</span>}
                    </button>
                  ))}
                </div>
              </>
            ):(
              <>
                <SectionTitleOKR>Lançamento — {MESES_OKR[editIdx]}</SectionTitleOKR>
                <GlassCard>
                  <div style={{fontSize:11,fontWeight:700,color:U.primary,textTransform:"uppercase",letterSpacing:1,margin:"1.25rem 0 0.875rem",paddingBottom:"0.5rem",borderBottom:`1px solid ${U.border}`}}>Indicadores do evento</div>
                  {inpOKR("eventos","Eventos realizados","(meta anual: 8)")}
                  {inpOKR("leads","Leads captados","(meta anual: 320)")}
                  {inpOKR("mqls","MQLs","(meta: 30% dos leads)")}
                  {inpOKR("sqls","SQLs","(meta: 15% dos MQLs)")}
                  {inpOKR("presencial","Visitas presenciais")}
                  {inpOKR("online","Visitas online")}
                  <div style={{fontSize:11,fontWeight:700,color:U.primary,textTransform:"uppercase",letterSpacing:1,margin:"1.25rem 0 0.875rem",paddingBottom:"0.5rem",borderBottom:`1px solid ${U.border}`}}>Financeiro / CAC</div>
                  {inpOKR("custo","Custo total do evento","(R$)","R$")}
                  {inpOKR("clientes","Novos clientes gerados")}
                  {inpOKR("ltv","LTV estimado por cliente","(R$)","R$")}
                  <div style={{display:"flex",gap:10,marginTop:"1.25rem"}}>
                    <button onClick={saveForm} style={{padding:"10px 22px",borderRadius:9,border:"none",background:`linear-gradient(135deg,${U.primary},${U.light})`,color:"#fff",cursor:"pointer",fontSize:13,fontWeight:600}}>Salvar</button>
                    <button onClick={()=>{setEditIdx(null);setForm({});}} style={{padding:"10px 22px",borderRadius:9,border:`1px solid ${U.border}`,background:U.bgCard,color:U.textSec,cursor:"pointer",fontSize:13}}>Cancelar</button>
                  </div>
                </GlassCard>
              </>
            )}
          </>
        )}

        {tab==="historico"&&(
          <>
            <SectionTitleOKR>Histórico mensal</SectionTitleOKR>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {data.filter(r=>r.saved).length===0&&<GlassCard><p style={{fontSize:12,color:U.textMuted,margin:0}}>Lance indicadores para ver o histórico.</p></GlassCard>}
              {data.filter(r=>r.saved).map((r,i)=>{
                const cac=num(r.clientes)>0?num(r.custo)/num(r.clientes):null;
                return (
                  <GlassCard key={i}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                      <span style={{fontSize:14,fontWeight:700,color:U.dark}}>{r.mes}</span>
                      {cac&&<span style={{fontSize:13,fontWeight:600,color:U.primary}}>CAC {brl(cac)}</span>}
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
                      {[{l:"Eventos",v:num(r.eventos),c:U.cyan},{l:"Leads",v:num(r.leads),c:U.warning},{l:"MQLs",v:num(r.mqls),c:U.success},{l:"SQLs",v:num(r.sqls),c:U.danger}].map(({l,v,c})=>(
                        <div key={l} style={{background:U.bgInfo,border:`1px solid ${U.borderLight}`,borderRadius:8,padding:"0.75rem"}}>
                          <div style={{fontSize:10,color:U.textMuted,marginBottom:3}}>{l}</div>
                          <div style={{fontSize:15,fontWeight:700,color:c}}>{v}</div>
                        </div>
                      ))}
                    </div>
                  </GlassCard>
                );
              })}
            </div>
          </>
        )}

        {tab==="cac"&&(
          <>
            <SectionTitleOKR>Custo de aquisição de clientes</SectionTitleOKR>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:"1.25rem"}}>
              <CacItem label="Custo total" val={totals.custo>0?brl(totals.custo):"—"} sub="acumulado no ano"/>
              <CacItem label="Clientes gerados" val={totals.clientes} sub="convertidos via eventos"/>
              <CacItem label="CAC médio" val={totals.clientes>0?brl(cacTotal):"—"} sub="custo / clientes"/>
              <CacItem label="Custo por lead" val={totals.leads>0?brl(custoPorLead):"—"} sub="custo / leads captados"/>
            </div>
            <GlassCard>
              <div style={{fontSize:12,fontWeight:700,color:U.primary,marginBottom:12}}>📊 Referência de mercado B2B — Relação LTV/CAC</div>
              {[{r:"4:1 ou mais",d:"Excelente — crescimento sustentável",c:U.success,bg:U.bgSuccess},{r:"2:1 a 3:1",d:"Aceitável — há espaço para otimização",c:U.warning,bg:U.bgWarning},{r:"Abaixo de 2:1",d:"Atenção — custo de aquisição elevado",c:U.danger,bg:U.bgDanger}].map(({r,d,c,bg})=>(
                <div key={r} style={{display:"flex",gap:12,alignItems:"center",marginBottom:8,padding:"8px 12px",background:bg,borderRadius:8,border:`1px solid ${c}30`}}>
                  <span style={{fontSize:12,fontWeight:700,color:c,minWidth:90}}>{r}</span>
                  <span style={{fontSize:11,color:U.textSec}}>{d}</span>
                </div>
              ))}
            </GlassCard>
          </>
        )}

        {tab==="analise"&&(
          <>
            <SectionTitleOKR>Diagnóstico inteligente</SectionTitleOKR>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:"1.25rem"}}>
              {[{l:"Meses com dados",v:mesesComDados.length},{l:"Taxa MQL",v:taxaMQL?taxaMQL+"%":"—"},{l:"CAC médio",v:totals.clientes>0?brl(cacTotal):"—"},{l:"Mix presencial",v:totalVisitas>0?mixPres+"%":"—"}].map(({l,v})=>(

              </GlassCard>
            )}
          </>
        )}
      </div>
    </div>
  );
}

// TICKET MÉDIO — CPL — CAC MODULE
// ═══════════════════════════════════════════════════════════════
function TicketMedio({negocios,setNegocios,orcamentos}){
  const [subTab,setSubTab]=useState("geral");
  const [selConsultor,setSelConsultor]=useState("Todos");

  const consultores=[...new Set(negocios.map(n=>n.responsavel).filter(Boolean))];
  const filtrados=selConsultor==="Todos"?negocios:negocios.filter(n=>n.responsavel===selConsultor);

  // Métricas gerais
  const totalFat=filtrados.reduce((s,n)=>s+n.valor,0);
  const qtdVendas=filtrados.filter(n=>n.fase==="Fechamento").length;
  const ticketMedio=qtdVendas>0?totalFat/qtdVendas:0;
  const totalInvest=filtrados.reduce((s,n)=>s+(n.investimento||0),0);
  const totalLeads=filtrados.reduce((s,n)=>s+(n.leads||0),0);
  const cpl=totalLeads>0?totalInvest/totalLeads:0;
  const taxaConv=filtrados.length>0?qtdVendas/filtrados.length:0;
  const cac=taxaConv>0?cpl/taxaConv:0;
  const roi=totalInvest>0?((totalFat-totalInvest)/totalInvest)*100:0;

  // Por consultor
  const porConsultor=consultores.map(c=>{
    const ns=negocios.filter(n=>n.responsavel===c);
    const fat=ns.reduce((s,n)=>s+n.valor,0);
    const vendas=ns.filter(n=>n.fase==="Fechamento").length;
    const invest=ns.reduce((s,n)=>s+(n.investimento||0),0);
    const leads=ns.reduce((s,n)=>s+(n.leads||0),0);
    const tm=vendas>0?fat/vendas:0;
    const cplC=leads>0?invest/leads:0;
    const taxC=ns.length>0?vendas/ns.length:0;
    const cacC=taxC>0?cplC/taxC:0;
    const orcConsultor=orcamentos.filter(o=>o.consultor===c);
    const budgetTotal=orcConsultor.reduce((s,o)=>s+(o.orcamento||0),0);
    const gastoTotal=orcConsultor.reduce((s,o)=>s+(o.gasto||0),0);
    return{consultor:c,fat,vendas,invest,leads,tm,cpl:cplC,cac:cacC,budget:budgetTotal,gasto:gastoTotal,qtd:ns.length,taxConv:taxC};
  }).sort((a,b)=>b.fat-a.fat);

  // Por cliente (empresa)
  const porCliente=[...new Set(filtrados.map(n=>n.empresa))].map(emp=>{
    const ns=filtrados.filter(n=>n.empresa===emp);
    const fat=ns.reduce((s,n)=>s+n.valor,0);
    const vendas=ns.filter(n=>n.fase==="Fechamento").length;
    const invest=ns.reduce((s,n)=>s+(n.investimento||0),0);
    const leads=ns.reduce((s,n)=>s+(n.leads||0),0);
    const tm=vendas>0?fat/vendas:0;
    const cplC=leads>0?invest/leads:0;
    const curva=ns[0]?.curva||"C";
    // Estratégia automática baseada em TM e CPL
    let estrategia="Manter engajamento regular";
    if(tm>150000)estrategia="Conta estratégica — alocar Consultor Senior + eventos presenciais";
    else if(tm>50000)estrategia="Conta importante — visitas mensais + proposta personalizada";
    else if(cplC>0&&cplC>tm*0.1)estrategia="⚠ CPL elevado — revisar canal de prospecção";
    return{empresa:emp,fat,vendas,invest,leads,tm,cpl:cplC,curva,estrategia,qtd:ns.length};
  }).sort((a,b)=>b.tm-a.tm);

  const MetricCard=({icon,label,value,sub,color,bg})=>(
    <div style={{background:bg||U.bgCard,border:`1px solid ${U.borderLight}`,borderRadius:14,padding:"1rem 1.25rem",boxShadow:"0 2px 8px rgba(0,87,184,0.07)"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
        <span style={{fontSize:20}}>{icon}</span>
        <span style={{fontSize:10,color:U.textMuted,textTransform:"uppercase",letterSpacing:0.8,fontWeight:600}}>{label}</span>
      </div>
      <div style={{fontSize:22,fontWeight:700,color:color||U.dark}}>{value}</div>
      {sub&&<div style={{fontSize:10,color:U.textMuted,marginTop:3}}>{sub}</div>}
    </div>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <ST t="Ticket Médio & CPL" sub="Estratégia comercial por cliente e consultor"/>

      {/* Filtro consultor */}
      <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
        <span style={{fontSize:11,color:U.textMuted,fontWeight:500}}>Filtrar por:</span>
        {["Todos",...consultores].map(c=>(
          <span key={c} onClick={()=>setSelConsultor(c)} style={{fontSize:11,padding:"4px 14px",borderRadius:20,cursor:"pointer",background:selConsultor===c?U.primary:U.bgCard,color:selConsultor===c?"white":U.textSec,border:`1px solid ${selConsultor===c?U.primary:U.border}`,fontWeight:500}}>{c}</span>
        ))}
      </div>

      {/* KPI cards */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12}}>
        <MetricCard icon="🎯" label="Ticket Médio" value={ticketMedio>0?fmtK(ticketMedio):"—"} sub={`${qtdVendas} fechamentos`} color={U.primary}/>
        <MetricCard icon="📍" label="CPL" value={cpl>0?fmt(cpl):"—"} sub={`${totalLeads} leads · R$ ${totalInvest.toLocaleString("pt-BR")} invest.`} color={U.warning}/>
        <MetricCard icon="🔁" label="CAC" value={cac>0?fmtK(cac):"—"} sub={`Taxa conv.: ${(taxaConv*100).toFixed(1)}%`} color={U.light}/>
        <MetricCard icon="📊" label="ROI" value={roi!==0?`${roi.toFixed(0)}%`:"—"} sub="(fat - invest) / invest" color={roi>=0?U.success:U.danger}/>
        <MetricCard icon="💸" label="Total Investido" value={totalInvest>0?fmtK(totalInvest):"—"} sub={`${filtrados.length} oportunidades`} color={U.dark}/>
      </div>

      {/* Fórmula explicativa */}
      <div style={{background:`linear-gradient(135deg,${U.bgSide},${U.dark})`,borderRadius:14,padding:"1rem 1.5rem",display:"flex",gap:24,alignItems:"center",flexWrap:"wrap"}}>
        {[["Ticket Médio","Faturamento ÷ Nº Vendas",U.cyan],["CPL","Gasto Total ÷ Nº Leads","#FBBF24"],["CAC","CPL ÷ Taxa de Conversão","#34D399"]].map(([m,f,c])=>(
          <div key={m} style={{display:"flex",gap:10,alignItems:"center"}}>
            <div style={{background:"rgba(255,255,255,0.08)",borderRadius:10,padding:"8px 14px",textAlign:"center"}}>
              <div style={{fontSize:11,fontWeight:700,color:c}}>{m}</div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.5)",marginTop:2}}>{f}</div>
            </div>
            {m!=="CAC"&&<span style={{color:"rgba(255,255,255,0.3)",fontSize:18}}>→</span>}
          </div>
        ))}
        <div style={{marginLeft:"auto",fontSize:10,color:"rgba(255,255,255,0.4)"}}>Monitorar semanalmente · Priorizar canais com CPL &lt; TM × conversão</div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:2,borderBottom:`1px solid ${U.borderLight}`}}>
        {[{id:"geral",l:"📊 Por Cliente"},{id:"consultor",l:"👤 Por Consultor"},{id:"estrategia",l:"🎯 Estratégia"}].map(t=>(
          <div key={t.id} onClick={()=>setSubTab(t.id)} style={{fontSize:12,padding:"8px 18px",cursor:"pointer",borderBottom:subTab===t.id?`2px solid ${U.primary}`:"2px solid transparent",color:subTab===t.id?U.primary:U.textSec,fontWeight:subTab===t.id?600:400}}>{t.l}</div>
        ))}
      </div>

      {/* Por Cliente */}
      {subTab==="geral"&&(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {porCliente.map(c=>{
            const am=ABC[c.curva]||ABC.C;
            const tmOk=c.tm>0;
            const cplOk=c.cpl>0&&c.cpl<c.tm*0.15;
            return(
              <Crd key={c.empresa}>
                <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                  <div style={{width:40,height:40,borderRadius:10,background:am.bg,border:`1.5px solid ${am.bdr}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{am.icon}</div>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6,flexWrap:"wrap"}}>
                      <span style={{fontWeight:700,fontSize:13,color:U.dark}}>{c.empresa}</span>
                      <Bdg label={am.full} bg={am.bg} tc={am.tc} bdr={am.bdr} fs={10}/>
                      <Bdg label={`${c.qtd} oport.`} bg={U.bgInfo} tc={U.primary} fs={10}/>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:8}}>
                      {[
                        {l:"Ticket Médio",v:tmOk?fmtK(c.tm):"—",c:U.primary},
                        {l:"CPL",v:c.cpl>0?fmt(c.cpl):"—",c:cplOk?U.success:c.cpl>0?U.warning:U.textMuted},
                        {l:"Investido",v:c.invest>0?fmtK(c.invest):"—",c:U.dark},
                        {l:"Leads",v:c.leads||"—",c:U.light},
                      ].map(({l,v,c:cor})=>(
                        <div key={l} style={{background:U.bg,borderRadius:8,padding:"6px 10px"}}>
                          <div style={{fontSize:9,color:U.textMuted,marginBottom:2}}>{l}</div>

                      ))}
                    </div>
                    <div style={{background:cplOk?U.bgSuccess:c.tm>150000?U.bgInfo:U.bgWarning,borderRadius:8,padding:"6px 12px",display:"flex",gap:6,alignItems:"center"}}>
                      <span style={{fontSize:11}}>{c.tm>150000?"🏆":cplOk?"✅":"⚡"}</span>
                      <span style={{fontSize:11,color:cplOk?U.success:c.tm>150000?U.primary:U.warning,fontWeight:500}}>{c.estrategia}</span>
                    </div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontSize:16,fontWeight:700,color:U.primary}}>{fmtK(c.fat)}</div>
                    <div style={{fontSize:10,color:U.textMuted,marginTop:2}}>{c.vendas} fechamento{c.vendas!==1?"s":""}</div>
                  </div>
                </div>
              </Crd>
            );
          })}
        </div>
      )}

      {/* Por Consultor */}
      {subTab==="consultor"&&(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {porConsultor.map((c,i)=>{
            const budgetPct=c.budget>0?Math.min(100,Math.round(c.gasto/c.budget*100)):0;
            return(
              <Crd key={c.consultor}>
                <div style={{display:"flex",gap:14,alignItems:"center"}}>
                  <div style={{width:44,height:44,borderRadius:22,background:`linear-gradient(135deg,${U.primary},${U.light})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:"white",flexShrink:0}}>
                    {c.consultor.split(" ").map(x=>x[0]).join("").slice(0,2)}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>

                      <Bdg label={`${c.qtd} oport.`} bg={U.bgInfo} tc={U.primary} fs={10}/>
                      <Bdg label={`${(c.taxConv*100).toFixed(0)}% conv.`} bg={c.taxConv>=0.5?U.bgSuccess:U.bgWarning} tc={c.taxConv>=0.5?U.success:U.warning} fs={10}/>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,marginBottom:8}}>
                      {[
                        {l:"Faturamento",v:fmtK(c.fat),c:U.primary},
                        {l:"Ticket Médio",v:c.tm>0?fmtK(c.tm):"—",c:U.dark},
                        {l:"CPL",v:c.cpl>0?fmt(c.cpl):"—",c:U.warning},

                        <div key={l} style={{background:U.bg,borderRadius:8,padding:"5px 8px"}}>

        <div style={{display:"flex",flexDirection:"column",gap:12}}>

                {titulo:"⭐ Contas Importantes",desc:"TM R$ 50K–150K",color:ABC.B.bdr,bg:ABC.B.bg,tc:ABC.B.tc,itens:porCliente.filter(c=>c.tm>=50000&&c.tm<=150000)},

                  <div style={{fontSize:12,fontWeight:700,color:tc,marginBottom:4}}>{titulo}</div>
                  <div style={{fontSize:10,color:U.textMuted,marginBottom:8}}>{desc}</div>
                  {itens.length===0?<div style={{fontSize:11,color:U.textMuted,fontStyle:"italic"}}>Nenhuma conta nesta categoria</div>:
                    itens.map(c=>(
                      <div key={c.empresa} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 8px",background:"white",borderRadius:8,marginBottom:5}}>

              ))}

            <div style={{fontSize:12,fontWeight:700,color:U.dark,marginBottom:10}}>📅 Cadência sugerida de acompanhamento</div>

    </div>

}

function Orcamento({negocios,orcamentos,setOrcamentos}){

  const lista=filtroC==="Todos"?orcamentos:orcamentos.filter(o=>o.consultor===filtroC);

  // Totais por consultor
  const porConsultor=consultores.map(c=>{
    const os=orcamentos.filter(o=>o.consultor===c);
    const budget=os.reduce((s,o)=>s+(o.orcamento||0),0);
    const gasto=os.reduce((s,o)=>s+(o.gasto||0),0);

    return{consultor:c,budget,gasto,saldo:budget-gasto,vendas,fat,roi,qtdLanc:os.length};
  }).sort((a,b)=>b.budget-a.budget);

  const totGlobal={budget:orcamentos.reduce((s,o)=>s+(o.orcamento||0),0),gasto:orcamentos.reduce((s,o)=>s+(o.gasto||0),0)};
  const totGastoUtiliz=totGlobal.budget>0?Math.round(totGlobal.gasto/totGlobal.budget*100):0;

  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>

        <KPI label="Total Gasto" value={fmtK(totGlobal.gasto)} icon="💸" grad={`linear-gradient(135deg,${U.warning},#FBBF24)`}/>
        <KPI label="Saldo Disponível" value={fmtK(totGlobal.budget-totGlobal.gasto)} icon="✅" grad={totGlobal.budget>=totGlobal.gasto?"linear-gradient(135deg,#1D9E75,#34D399)":"linear-gradient(135deg,#DC2626,#F87171)"}/>

              <div style={{fontSize:10,color:U.textMuted,marginBottom:4,fontWeight:500}}>Consultor *</div>

                {consultores.map(c=><option key={c}>{c}</option>)}

            </div>
            <div>
              <div style={{fontSize:10,color:U.textMuted,marginBottom:4,fontWeight:500}}>Período</div>

            </div>
            <div>
              <div style={{fontSize:10,color:U.textMuted,marginBottom:4,fontWeight:500}}>Categoria</div>
              <select value={form.categoria} onChange={e=>setForm({...form,categoria:e.target.value})} style={{width:"100%",border:`1px solid ${U.border}`,borderRadius:8,padding:"7px 10px",fontSize:12}}>

            <div style={{gridColumn:"1/-1"}}>
              <div style={{fontSize:10,color:U.textMuted,marginBottom:4,fontWeight:500}}>Descrição *</div>

                    <div style={{fontSize:11,color:U.textMuted,marginBottom:6}}>{o.consultor} · {o.periodo}</div>

                      <span>{pct2}% utilizado</span>
                      {c.roi!==0&&<span style={{color:c.roi>=0?U.success:U.danger,fontWeight:600}}>ROI: {c.roi.toFixed(0)}%</span>}
                    </div>
                  </div>
                </div>
              </Crd>
            );
          })}
        </div>
      )}

      {/* Conversão */}
      {subTab==="conversao"&&(
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Crd style={{background:`linear-gradient(135deg,${U.bgInfo},white)`}}>
            <div style={{fontSize:13,fontWeight:700,color:U.dark,marginBottom:12}}>📊 Budget × Conversão × ROI por Consultor</div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                <thead>
                  <tr style={{borderBottom:`2px solid ${U.border}`}}>
                    {["Consultor","Budget","Gasto","Oport.","Fechamentos","Faturamento","CPL","TM","ROI"].map(h=>(
                      <th key={h} style={{textAlign:"left",padding:"8px 10px",fontSize:10,fontWeight:700,color:U.primary,textTransform:"uppercase",letterSpacing:0.5}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {porConsultor.map((c,i)=>{
                    const ns=negocios.filter(n=>n.responsavel===c.consultor);
                    const leads=ns.reduce((s,n)=>s+(n.leads||0),0);
                    const cplC=leads>0?c.gasto/leads:0;
                    const tmC=c.vendas>0?c.fat/c.vendas:0;
                    return(
                      <tr key={c.consultor} style={{borderBottom:`1px solid ${U.borderLight}`,background:i%2===0?"white":U.bg}}>
                        <td style={{padding:"9px 10px",fontWeight:600,color:U.dark}}>{c.consultor}</td>
                        <td style={{padding:"9px 10px",color:U.primary,fontWeight:600}}>{fmtK(c.budget)}</td>
                        <td style={{padding:"9px 10px",color:U.warning,fontWeight:600}}>{fmtK(c.gasto)}</td>
                        <td style={{padding:"9px 10px",color:U.textSec}}>{c.qtd}</td>
                        <td style={{padding:"9px 10px",color:U.success,fontWeight:600}}>{c.vendas}</td>
                        <td style={{padding:"9px 10px",color:U.primary,fontWeight:700}}>{fmtK(c.fat)}</td>
                        <td style={{padding:"9px 10px",color:cplC>0?U.warning:U.textMuted}}>{cplC>0?fmt(cplC):"—"}</td>
                        <td style={{padding:"9px 10px",color:tmC>0?U.dark:U.textMuted,fontWeight:600}}>{tmC>0?fmtK(tmC):"—"}</td>
                        <td style={{padding:"9px 10px"}}><Bdg label={c.roi!==0?`${c.roi.toFixed(0)}%`:"—"} bg={c.roi>=100?U.bgSuccess:c.roi>=0?U.bgInfo:U.bgDanger} tc={c.roi>=100?U.success:c.roi>=0?U.primary:U.danger} fs={10}/></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </Crd>
          <div style={{background:U.bgWarning,border:`1px solid ${U.warning}40`,borderRadius:12,padding:"0.9rem 1.25rem"}}>
            <div style={{fontSize:12,fontWeight:700,color:U.warning,marginBottom:6}}>💡 Regra de Priorização de Canal</div>
            <div style={{fontSize:12,color:U.textSec,lineHeight:1.6}}>
              Priorize canais onde <strong>CPL &lt; Ticket Médio × Taxa de Conversão esperada</strong>. 
              Monitore semanalmente e realoque budget dos canais com CPL acima do threshold para os de melhor desempenho.
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// LOGIN — Microsoft Office 365

function LoginScreen({onLogin}){
  const [loading,setLoading]=useState(false);
  const [selUser,setSelUser]=useState(null);
  const [erro,setErro]=useState("");
  const [mostraDemo,setMostraDemo]=useState(false);

  const handleO365=()=>{
    setLoading(true);setErro("");
    // Simula fluxo OAuth2/MSAL da Microsoft
    setTimeout(()=>{
      setLoading(false);
      setMostraDemo(true);
    },1800);
  };

  const handleDemoLogin=(user)=>{
    setSelUser(user.id);
    setTimeout(()=>onLogin(user),600);
  };

    <div style={{minHeight:"100vh",background:`linear-gradient(135deg,${U.bgSide} 0%,${U.dark} 45%,${U.primary} 100%)`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",position:"relative",overflow:"hidden"}}>

      {/* Glow */}

        {/* Logo */}
        <div style={{textAlign:"center",marginBottom:"2.5rem"}}>
          <div style={{display:"inline-flex",alignItems:"center",gap:12,marginBottom:16}}>
            <div style={{width:52,height:52,background:"rgba(255,255,255,0.1)",borderRadius:14,border:"1px solid rgba(255,255,255,0.2)",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <Logo/>
            </div>
          </div>
          <div style={{fontSize:28,fontWeight:800,color:"white",letterSpacing:-0.5}}>uni<span style={{color:U.cyan}}>f</span>ique</div>
          <div style={{fontSize:13,color:"rgba(255,255,255,0.5)",marginTop:4,letterSpacing:0.5}}>Plataforma de Negócios TIC</div>
        </div>

        {/* Card */}
        <div style={{background:"rgba(255,255,255,0.97)",borderRadius:20,padding:"2rem",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>

            <>
              <div style={{textAlign:"center",marginBottom:"1.5rem"}}>
                <div style={{fontSize:18,fontWeight:700,color:U.dark}}>Bem-vindo de volta</div>

              </div>

              {/* Botão O365 */}
              <button onClick={handleO365} disabled={loading} style={{width:"100%",padding:"14px",borderRadius:12,border:`1px solid ${U.border}`,background:loading?"#f8faff":"white",cursor:loading?"wait":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:12,marginBottom:16,transition:"all .2s",boxShadow:"0 2px 8px rgba(0,87,184,0.1)"}}>
                {loading?(
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:20,height:20,border:`2px solid ${U.border}`,borderTop:`2px solid ${U.primary}`,borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
                    <span style={{fontSize:14,color:U.textSec}}>Autenticando com Microsoft...</span>

                ):(
                  <>
                    {/* Microsoft logo SVG */}
                    <svg width="20" height="20" viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#F25022"/><rect x="11" y="1" width="9" height="9" fill="#7FBA00"/><rect x="1" y="11" width="9" height="9" fill="#00A4EF"/><rect x="11" y="11" width="9" height="9" fill="#FFB900"/></svg>
                    <span style={{fontSize:14,fontWeight:600,color:U.dark}}>Entrar com Microsoft 365</span>

                <div style={{flex:1,height:1,background:U.borderLight}}/>
                <span style={{fontSize:11,color:U.textMuted}}>SSO via Azure AD</span>
                <div style={{flex:1,height:1,background:U.borderLight}}/>
              </div>

              <div style={{background:U.bgInfo,borderRadius:10,padding:"12px 14px"}}>
                <div style={{fontSize:11,color:U.primary,fontWeight:600,marginBottom:4}}>🔒 Autenticação segura</div>
