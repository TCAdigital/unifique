################################################################################
# UNIFIQUE — Nginx Configuration (produção)
# Arquivo: /etc/nginx/sites-available/unifique
# Ativar: sudo ln -s /etc/nginx/sites-available/unifique /etc/nginx/sites-enabled/
# Testar: sudo nginx -t
# Reload: sudo systemctl reload nginx
################################################################################

server {
    listen 80;
    listen [::]:80;
    server_name seu-dominio.com.br www.seu-dominio.com.br;

    # Redireciona tudo para HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name seu-dominio.com.br www.seu-dominio.com.br;

    # ── SSL (Let's Encrypt via Certbot) ─────────────────────────
    ssl_certificate     /etc/letsencrypt/live/seu-dominio.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/seu-dominio.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Raiz da aplicação ────────────────────────────────────────
    root /var/www/unifique;
    index index.html;

    # ── Compressão gzip ──────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # ── Cache de assets estáticos ─────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA routing (single page app) ────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Segurança — Headers HTTP ──────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"    always;
    add_header X-Content-Type-Options    "nosniff"       always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Bloqueia acesso a arquivos sensíveis ─────────────────────
    location ~ /\.(git|env|htaccess) {
        deny all;
        return 404;
    }

    # ── Logs ─────────────────────────────────────────────────────
    access_log /var/log/nginx/unifique_access.log;
    error_log  /var/log/nginx/unifique_error.log;

    # ── Tamanho máximo de upload ──────────────────────────────────
    client_max_body_size 20M;
}
